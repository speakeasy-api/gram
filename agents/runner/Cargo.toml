[package]
name = "gram-assistant-runner"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"

[[bin]]
name = "gram-assistant-runner"
path = "src/main.rs"

[dependencies]
agentkit-adapter-completions = "0.3.0"
agentkit-core = "0.3.0"
agentkit-http = { version = "0.3.0", features = ["reqwest-middleware-client"] }
agentkit-loop = "0.3.0"
agentkit-mcp = "0.3.0"
agentkit-reporting = { version = "0.3.0", features = ["tracing"] }
agentkit-tools-core = "0.3.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

async-trait = "0.1"
axum = { version = "0.7", features = ["http1", "json"] }
chrono = "0.4"
http = "1"
reqwest = "0.13.2"
reqwest-middleware = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["fs", "io-util", "macros", "net", "process", "rt-multi-thread", "sync", "time"] }
