# mprocs configuration
web_port: 35294
procs:
  otel-collector:
    cmd: ["docker", "compose", "logs", "-f", "otel-collector"]
    stop:
      send-keys: ["<C-c>"]
  jaeger:
    cmd: ["docker", "compose", "logs", "-f", "jaeger"]
    stop:
      send-keys: ["<C-c>"]
  prometheus:
    cmd: ["docker", "compose", "logs", "-f", "prometheus"]
    stop:
      send-keys: ["<C-c>"]
  pi-classifier:
    cmd: ["docker", "compose", "logs", "-f", "gram-pi-classifier"]
    stop:
      send-keys: ["<C-c>"]
  dev-idp:
    cmd: ["mise", "run", "start:dev-idp"]
    stop: SIGTERM
  dev-idp-dashboard:
    cmd: ["mise", "run", "start:dev-idp-dashboard"]
    stop:
      send-keys: ["<C-c>"]
  mock-oidc:
    cmd: ["mise", "run", "start:mock-oidc"]
    stop: SIGTERM
  server:
    cmd: ["mise", "run", "start:server"]
    stop: SIGTERM
  admin:
    cmd: ["mise", "run", "start:admin"]
    stop: SIGTERM
  worker:
    cmd: ["mise", "run", "start:worker"]
    stop: SIGTERM
  streams:
    cmd: ["mise", "run", "start:streams"]
    stop: SIGTERM
  presidio-scanner:
    cmd: ["mise", "run", "start:presidio-scanner"]
    stop:
      send-keys: ["<C-c>"]
  dashboard:
    cmd: ["mise", "run", "start:dashboard"]
    stop:
      send-keys: ["<C-c>"]
  assistant-runtime:
    cmd: ["mise", "run", "start:assistant-runtime"]
    stop:
      send-keys: ["<C-c>"]
