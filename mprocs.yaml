# mprocs configuration
procs:
  otel-collector:
    cmd: ["docker", "compose", "logs", "-f", "otel-collector"]
    stop:
      send-keys: ["<C-c>"]
  jaeger:
    cmd: ["docker", "compose", "logs", "-f", "jaeger"]
    stop:
      send-keys: ["<C-c>"]
  prometheus:
    cmd: ["docker", "compose", "logs", "-f", "prometheus"]
    stop:
      send-keys: ["<C-c>"]
  dev-idp:
    cmd: ["mise", "run", "start:dev-idp"]
    stop: SIGTERM
  server:
    cmd: ["mise", "run", "start:server"]
    stop: SIGTERM
  worker:
    cmd: ["mise", "run", "start:worker"]
    stop: SIGTERM
  admin:
    cmd: ["mise", "run", "start:admin"]
    stop: SIGTERM
  dashboard:
    cmd: ["mise", "run", "start:dashboard"]
    stop:
      send-keys: ["<C-c>"]
  elements:
    cmd: ["mise", "run", "start:elements"]
    stop:
      send-keys: ["<C-c>"]
  lima:
    cmd: ["mise", "run", "start:lima"]
    stop:
      send-keys: ["<C-c>"]
  assistant-runtime:
    cmd: ["mise", "run", "start:assistant-runtime"]
    stop:
      send-keys: ["<C-c>"]
