overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Edits to plug gaps in OpenAPI generated by Goa
  version: 0.0.0
actions:
  - target: $.components.securitySchemes["function_id_header_Gram-Function-ID"]
    remove: true
  - target: $.components.securitySchemes["function_token_header_Gram-Function-Token"]
    remove: true
  - target: $.components.schemas.Error
    update:
      x-speakeasy-name-override: ServiceError
  - target: $.paths.*[?(@.operationId=='uploadOpenAPIv3Asset' || @.operationId=='uploadFunctions' || @.operationId=='uploadImage')]
    update:
      requestBody:
        required: true
        content:
          "*/*":
            schema:
              type: string
              format: binary
  # Goa deduplicates request body schemas with identical structures.
  # removeGrants incorrectly references UpsertGrantsRequestBody because
  # RemoveGrantEntry and UpsertGrantForm share the same fields.
  - target: $.components.schemas
    update:
      RemoveGrantsRequestBody:
        type: object
        properties:
          grants:
            type: array
            items:
              $ref: "#/components/schemas/RemoveGrantEntry"
            description: The list of grants to remove, each identified by (principal_urn, scope, resource).
            minItems: 1
            maxItems: 100
        required:
          - grants
  - target: $.paths['/rpc/access.removeGrants'].post.requestBody.content['application/json'].schema
    update:
      $ref: "#/components/schemas/RemoveGrantsRequestBody"
  - target: $.paths..security
    update:
      - {}
