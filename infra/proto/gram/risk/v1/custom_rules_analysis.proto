edition = "2024";

package gram.risk.v1;

import "gcp/pubsub/v1/options.proto";

option go_package = "github.com/speakeasy-api/gram/infra/gen/gram/risk/v1;riskv1";

// CustomRulesAnalysis is a request to evaluate a chat message against a
// project's selected custom (CEL) detection rules. It carries the full CEL
// input model — content, message kind, and any recorded tool calls — so rules
// referencing tool_calls or kind evaluate identically to the in-process scan.
message CustomRulesAnalysis {
  string request_id = 1;
  string chat_message_id = 2;
  string project_id = 3;
  string organization_id = 4;
  string risk_policy_id = 5;
  int64 risk_policy_version = 6;
  string created_at = 7; // Must be UTC timestamp in RFC3339 format, e.g. 2023-01-01T00:00:00Z

  string content = 8;
  string kind = 9; // The message.Type string (e.g. "user_message", "tool_request").
  repeated ToolCall tool_calls = 10;
  repeated string custom_rule_ids = 11; // The policy's selected detector rule ids.

  // ToolCall is one recorded tool invocation surfaced from a message's tool calls.
  message ToolCall {
    string name = 1;
    string arguments = 2;
  }

  option (gcp.pubsub.v1.topic) = {
    retention_hint: {
      seconds: 604800 /* 7 days */
    }
  };
}
