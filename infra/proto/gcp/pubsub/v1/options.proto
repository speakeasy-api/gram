edition = "2024";

package gcp.pubsub.v1;

import "google/protobuf/descriptor.proto";
import "google/protobuf/duration.proto";

option go_package = "github.com/speakeasy-api/gram/infra/gen/gcp/pubsub/v1;pubsubv1";

message TopicOptions {
  // Optional. Defaults to the kebab-cased proto full name of the topic-declaring
  // message (e.g. message gram.outbox.v1.Event → "gram-outbox-v1-event"). Set
  // this to route publishing to a shared, externally-owned topic so several
  // messages can map onto a single topic ID. This overrides the topic ID only:
  // a message's generated PubSubSchema is always named after the message, never
  // after this field, because the schema describes that one message's shape.
  string name = 1;
  google.protobuf.Duration retention_hint = 2;
  map<string, string> labels = 3;
}

message SubscriptionOptions {
  // Optional. Defaults to the kebab-cased proto full name of the subscription
  // marker message (e.g. message gram.outbox.v1.Processor →
  // "gram-outbox-v1-processor").
  string name = 1;
  google.protobuf.Duration retention = 2;
  bool retain_acked_messages = 3;
  google.protobuf.Duration ack_deadline = 4;
  google.protobuf.Duration expiration_ttl = 5;
  RetryPolicy retry_policy = 6;
  map<string, string> labels = 7;
  string filter = 8;
  DeadLetterPolicy dead_letter = 9;
  // Required. Proto FullName of the topic-declaring message this subscription
  // consumes from (e.g. "outbox.event.v1.Event"). Validated against the
  // discovered topic set during reconciliation.
  string topic = 10;
  // When set, this subscription is a BigQuery export sink: messages are written
  // straight into a BigQuery table derived from the topic message's schema
  // rather than delivered to a consumer. A subscription with this field set
  // cannot be consumed in code — the subscriber-resolution helpers reject it.
  BigQuerySinkOptions bigquery = 11;
}

// BigQuerySinkOptions turns a subscription into a BigQuery export sink. The
// dataset is derived from the subscription's proto package (dots → underscores,
// e.g. gram.risk.v1 → gram_risk_v1) and the table from the snake-cased message
// name (e.g. FindingSink → finding_sink). The table schema is derived from the
// topic message this subscription consumes, and Pub/Sub writes structured
// columns using the topic's attached proto schema.
message BigQuerySinkOptions {
  // Retention for ingestion-time monthly partitions. Unset defaults to 60 days;
  // an explicit 0s disables expiration (partitions are kept forever). Presence
  // is meaningful: this is a message type, so an unset value is distinguishable
  // from an explicit zero.
  google.protobuf.Duration partition_expiration = 1;
  // When true, message fields absent from the BigQuery table schema are dropped
  // when writing instead of remaining in the subscription backlog. Recommended
  // for schema evolution.
  bool drop_unknown_fields = 2;
}

message RetryPolicy {
  google.protobuf.Duration minimum_backoff = 1;
  google.protobuf.Duration maximum_backoff = 2;
}

message DeadLetterPolicy {
  // DLQ topic ID. If unset, defaults to "<subscription-name>-dlq". The DLQ
  // topic carries the same message schema as the source topic and is created
  // automatically during reconciliation; no separate proto declaration is
  // needed.
  string name = 1;
  int32 max_delivery_attempts = 2;
}

extend google.protobuf.MessageOptions {
  TopicOptions topic = 50001;
  SubscriptionOptions subscription = 50002;
}
