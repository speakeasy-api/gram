server:
  - "go.mod"
  - "go.sum"
  - "agents/**"
  - "server/**"

client:
  - "client/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "tsconfig.json"
  - "sdks/typescript/**"

functions:
  - "go.mod"
  - "go.sum"
  - "functions/**"

cli:
  - "go.mod"
  - "go.sum"
  - "cli/**"
  - "server/design/**"
  - "server/gen/**"

tsframework:
  - "ts-framework/**"

sdk:
  - "client/sdk/**"
  - "package.json"
  - "pnpm-lock.yaml"

sdk-gen:
  - ".speakeasy/workflow.yaml"
  - "client/sdk/.speakeasy/gen.yaml"
  - "mise.toml"
  - "overlays/**"
  - "server/gen/http/openapi3.yaml"

elements:
  - "elements/**"

migrations:
  - "go.mod"
  - "go.sum"
  - "server/migrations/**"
  - "server/clickhouse/migrations/**"

database-changes:
  - "server/migrations/**"
  - "server/clickhouse/**"

plog:
  - "go.mod"
  - "go.sum"
  - "plog/**"

# Subset of `server` that gates the prompt-injection accuracy comment job.
# Strict subset of server/** so server-test (which uploads the metrics
# artifact) is guaranteed to have run when this is true.
risk_accuracy:
  - "server/internal/background/activities/risk_analysis/**"
