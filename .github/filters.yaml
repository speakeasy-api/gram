server:
  - "go.mod"
  - "go.sum"
  - "agents/**"
  - "server/**"

client:
  - "client/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "tsconfig.json"
  - "sdks/typescript/**"

functions:
  - "go.mod"
  - "go.sum"
  - "functions/**"

cli:
  - "go.mod"
  - "go.sum"
  - "cli/**"
  - "server/design/**"
  - "server/gen/**"

tsframework:
  - "ts-framework/**"

sdk:
  - "client/sdk/**"
  - "package.json"
  - "pnpm-lock.yaml"

sdk-gen:
  - ".speakeasy/workflow.yaml"
  - "client/sdk/.speakeasy/gen.yaml"
  - "mise.toml"
  - "overlays/**"
  - "server/gen/http/openapi3.yaml"

elements:
  - "elements/**"

migrations:
  - "go.mod"
  - "go.sum"
  - "server/migrations/**"
  - "server/clickhouse/migrations/**"

database-changes:
  - "server/migrations/**"
  - "server/clickhouse/**"

plog:
  - "go.mod"
  - "go.sum"
  - "plog/**"

infra:
  - "go.mod"
  - "go.sum"
  - "infra/**"
  - "buf.yaml"
  - "buf.gen.yaml"
  - "uv.lock"
  - "pyproject.toml"
  - ".mise-tasks/lint/infra.sh"
  - ".mise-tasks/test/infra.sh"
  - ".mise-tasks/gen/infra.sh"

pystreams:
  - "uv.lock"
  - "pyproject.toml"
  - "pystreams/**"
  # pystreams depends on the gram-infra workspace member (path dependency), so
  # source edits to its Python modules don't bump uv.lock. Watch them directly:
  # pystreams imports gram_infra.* and the buf-generated gram.* (from gen_py).
  - "infra/gram_infra/**"
  - "infra/gen_py/**"
  - ".mise-tasks/lint/pystreams.sh"
  - ".mise-tasks/test/pystreams.sh"

webhooks-catalog:
  - "server/internal/outbox/events/catalog_gen.yaml"

otel-collector:
  - "otel-collector/**"
