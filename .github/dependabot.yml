# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/workflows/composite/build-push"
    schedule:
      interval: "weekly"
    groups:
      artifacts:
        patterns:
          - "actions/download-artifact"
          - "actions/upload-artifact"
  - package-ecosystem: "gomod"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    groups:
      otel:
        patterns:
          - "go.opentelemetry.io/*"
      goa:
        patterns:
          - "goa.design/*"
      temporal:
        patterns:
          - "go.temporal.io/*"
      testcontainers:
        patterns:
          - "github.com/testcontainers/*"
      kubernetes:
        patterns:
          - "k8s.io/*"
      redis:
        patterns:
          - "github.com/redis/go-redis/*"
      aws:
        patterns:
          - "github.com/aws/aws-sdk-go-v2/*"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"
      assistant-ui:
        patterns:
          - "@assistant-ui/*"
      class-names:
        patterns:
          - "clsx"
          - "tailwind-merge"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tanstack:
        patterns:
          - "@tanstack/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/postcss"
          - "@tailwindcss/typography"
          - "@tailwindcss/vite"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
  - package-ecosystem: "docker"
    directories:
      - "/server"
      - "/agents/runtime-image"
      - "/client/dashboard"
      - "/otel-collector"
      - "/pystreams"
    schedule:
      interval: "weekly"
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      opentelemetry:
        patterns:
          - "opentelemetry-*"
