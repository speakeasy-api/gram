name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    # We have setup NPM trusted publishing which requires running the release
    # workflow on GitHub-hosted runners. It can running on ubicloud or any other
    # self-hosted runners that we manage.
    # https://docs.npmjs.com/trusted-publishers
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push tags
      pull-requests: read
      issues: read
      id-token: write # to publish to NPM
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    env:
      GRAM_GIT_SHA: "${{ github.sha }}"
    steps:
      - name: Checkout Repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: Cache PNPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: ${{ env.GH_CACHE_PNPM_KEY }}
          restore-keys: |
            ${{ env.GH_CACHE_PNPM_KEY }}
            ${{ env.GH_CACHE_PNPM_KEY_PARTIAL }}
          path: |
            ${{ env.PNPM_STORE_PATH }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.GRAM_BOT_APP_ID }}
          private-key: ${{ secrets.GRAM_BOT_PRIVATE_KEY }}

      # Configure git to commit as the GitHub App so commits trigger workflows.
      # Commits from github-actions[bot] don't trigger workflows by design.
      - name: Configure git for GitHub App
        run: |
          git config user.name "gram-bot[bot]"
          git config user.email "gram-bot[bot]@users.noreply.github.com"

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          title: "chore: version packages"
          publish: mise exec --env viteprod -- pnpm changeset publish
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Prune PNPM store
        run: pnpm store prune

  release-cli:
    needs: [release]
    if: needs.release.outputs.published == 'true' && contains(fromJSON(needs.release.outputs.publishedPackages).*.name, 'cli')
    name: Release Gram CLI
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push tags
      id-token: write # for cosign keyless signing
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"
          # Reference: https://github.com/actions/setup-go/issues/495
          cache: false
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Generate GitHub App Token for Gram Bot
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.GRAM_BOT_APP_ID }}
          private-key: ${{ secrets.GRAM_BOT_PRIVATE_KEY }}
          owner: speakeasy-api
          repositories: gram,homebrew-tap
      - name: Create release tag
        # GoReleaser expects a tag on HEAD before releasing. The newest tag
        # will be on an old commit, specified by `changeset`, so this is a
        # local-only tag to help GoReleaser publish.
        run: |
          version=$(jq -r .version cli/package.json)
          tag="cli/$version"
          git tag -f "$tag"
          echo "Created local tag $tag"
      - name: goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser-pro
          version: "~> v2.17"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
          GORELEASER_KEY: ${{secrets.GORELEASER_PRO_LICENSE_KEY}}

  release-tunnel-agent:
    needs: [release]
    if: needs.release.outputs.published == 'true' && contains(fromJSON(needs.release.outputs.publishedPackages).*.name, 'tunnel')
    name: Release Gram Tunnel Agent image
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/speakeasy-api/gram-tunnel-agent
    permissions:
      contents: read
      id-token: write # for cosign keyless signing
      packages: write # to push the image to ghcr.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Read tunnel agent version
        id: version
        run: echo "version=$(jq -r .version tunnel/package.json)" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: tunnel/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/speakeasy-api/gram
            org.opencontainers.image.description=Gram tunnel agent: connects a local MCP server to the Gram tunnel gateway
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=AGPL-3.0
      - name: Sign image
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"
