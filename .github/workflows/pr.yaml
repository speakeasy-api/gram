  # Gate job: aggregates all check results into a single required status check.
  # This allows domain-specific jobs to skip (via job-level `if`) without blocking
  # merge, since skipped jobs don't report a status to rulesets.
  ci-gate:
    name: CI Gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: always()
    needs:
      - changes
      - format-check
      - server-build-lint
      - server-test
      - docker-build-server
      - docker-build-client
      - docker-build-pystreams
      - client-build-lint
      - client-test
      - sdk-gen-check
      - cli-build-lint
      - hooks-build-test
      - plog-build-lint
      - infra-build-lint
      - pystreams-build-lint
      - functions-build-host
      - functions-image
      - assistant-runtime-image
      - otel-collector
      - ts-framework-test
      - golang-migrate-clickhouse
      - atlas-lint
      - atlas-push
      - webhooks-catalog-breaking-changes
      - tunnel-agent
      - svix-sync-webhooks
    steps:
      - name: Check results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed_output=$(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | "❌ \(.key) (\(.value.result))"') || { echo "Error: jq command failed"; exit 1; }
          failed=()
          while IFS= read -r line; do
            [[ -n "$line" ]] && failed+=("$line")
          done <<< "$failed_output"

          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "CI failed. The following checks did not pass:"
            for item in "${failed[@]}"; do
              echo "  $item"
            done
            exit 1
          fi

          echo "✅ All CI checks passed or were skipped."

  svix-sync-webhooks:
    name: Sync webhook event types to Svix
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [server-build-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SVIX_OPENAPI_FILE: server/internal/outbox/events/catalog_gen.yaml
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1
      - name: Upload event types to Svix (dev)
