name: Pull Request
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: gcr.io/linen-analyst-344721 #gcr for speakeasy-common gcr registry
  DOCKER_REPOSITORY_OWNER: ${{github.repository_owner}}
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  changes:
    name: Tag branch changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: "read"
      pull-requests: read
    outputs:
      server: ${{ steps.gates.outputs.server }}
      client: ${{ steps.gates.outputs.client }}
      cli: ${{ steps.gates.outputs.cli }}
      hooks: ${{ steps.gates.outputs.hooks }}
      functions: ${{ steps.gates.outputs.functions }}
      tsframework: ${{ steps.gates.outputs.tsframework }}
      migrations: ${{ steps.gates.outputs.migrations }}
      plog: ${{ steps.gates.outputs.plog }}
      infra: ${{ steps.gates.outputs.infra }}
      pystreams: ${{ steps.gates.outputs.pystreams }}
      sdk: ${{ steps.gates.outputs.sdk }}
      sdk-gen: ${{ steps.gates.outputs.sdk-gen }}
      webhooks-catalog: ${{ steps.gates.outputs.webhooks-catalog }}
      otel-collector: ${{ steps.gates.outputs.otel-collector }}
      tunnel: ${{ steps.gates.outputs.tunnel }}
      preview-retag-components: ${{ steps.preview-retag.outputs.components }}
      preview-tag: ${{ steps.preview-retag.outputs.tag }}
    steps:
      - name: Checkout source code
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        name: Check for changed packages
        id: filter
        with:
          filters: .github/filters.yaml
      - id: gates
        name: Set outputs
        env:
          HAS_FULL_CI_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'ci:full') }}
        run: |
          if [[ "${{ steps.filter.outputs.server }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "server=true" >> $GITHUB_OUTPUT
            echo "Server jobs will run."
          else
            echo "Server jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.client }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "client=true" >> $GITHUB_OUTPUT
            echo "Client jobs will run."
          else
            echo "Client jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.cli }}" == "true" || "${{ github.ref }}" ==  "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "cli=true" >> $GITHUB_OUTPUT
            echo "CLI jobs will run."
          else
            echo "CLI jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.hooks }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "hooks=true" >> $GITHUB_OUTPUT
            echo "Hooks jobs will run."
          else
            echo "Hooks jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.functions }}" == "true" || "${{ github.ref }}" ==  "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "functions=true" >> $GITHUB_OUTPUT
            echo "Functions jobs will run."
          else
            echo "Functions jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.tsframework }}" == "true" || "${{ github.ref }}" ==  "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "tsframework=true" >> $GITHUB_OUTPUT
            echo "TypeScript framework jobs will run."
          else
            echo "TypeScript framework jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.migrations }}" == "true" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "migrations=true" >> $GITHUB_OUTPUT
            echo "Migrations jobs will run."
          else
            echo "Migrations jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.plog }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "plog=true" >> $GITHUB_OUTPUT
            echo "Plog jobs will run."
          else
            echo "Plog jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.infra }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "infra=true" >> $GITHUB_OUTPUT
            echo "Infra jobs will run."
          else
            echo "Infra jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.pystreams }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "pystreams=true" >> $GITHUB_OUTPUT
            echo "Pystreams jobs will run."
          else
            echo "Pystreams jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.sdk }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "sdk=true" >> $GITHUB_OUTPUT
            echo "SDK jobs will run."
          else
            echo "SDK jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.sdk-gen }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "sdk-gen=true" >> $GITHUB_OUTPUT
            echo "SDK generation check will run."
          else
            echo "SDK generation check will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.webhooks-catalog }}" == "true" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "webhooks-catalog=true" >> $GITHUB_OUTPUT
            echo "Webhooks catalog breaking-change check will run."
          else
            echo "Webhooks catalog breaking-change check will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.otel-collector }}" == "true" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "otel-collector=true" >> $GITHUB_OUTPUT
            echo "OTel collector jobs will run."
          else
            echo "OTel collector jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.tunnel }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "tunnel=true" >> $GITHUB_OUTPUT
            echo "Tunnel jobs will run."
          else
            echo "Tunnel jobs will be skipped."
          fi
      - id: preview-retag
        name: Compute preview images to retag
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
          SERVER: ${{ steps.gates.outputs.server }}
          CLIENT: ${{ steps.gates.outputs.client }}
          PYSTREAMS: ${{ steps.gates.outputs.pystreams }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "$IS_PR" != "true" ]]; then
            echo "components=[]" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag=pr-${PR_NUMBER}-$(cut -c1-8 <<< "$HEAD_SHA")" >> "$GITHUB_OUTPUT"

          # Components whose docker build jobs are skipped this run still need
          # a preview image tag; each entry names the image and the
          # .github/filters.yaml keys whose paths gate its builds. The
          # dashboard image is built by docker-build-client whenever client OR
          # server changes.
          components='[]'
          add() {
            components=$(jq -c --arg component "$1" --arg filters "$2" '. + [{component: $component, filters: $filters}]' <<< "$components")
          }
          [[ "$SERVER" == "true" ]] || add gram server
          [[ "$SERVER" == "true" || "$CLIENT" == "true" ]] || add gram-dashboard "server client"
          [[ "$PYSTREAMS" == "true" ]] || add gram-pystreams pystreams
          echo "components=$components" >> "$GITHUB_OUTPUT"

  preview-image-tags:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: changes
    # Preview environments deploy images tagged pr-<number>-<8-char head sha>
    # for every PR head commit. Components with changes get that tag from
    # their docker build jobs; unchanged components reuse an existing image
    # from main by aliasing it with the preview tag. This keeps preview tags
    # available for every head commit without rebuilding anything, which is
    # also why adding the preview label does not need to re-run this workflow.
    if: |
      github.event_name == 'pull_request' &&
      !github.event.pull_request.head.repo.fork &&
      needs.changes.outputs.preview-retag-components != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.preview-retag-components) }}
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1
        with:
          # Full history so the retag step can compare against main commits.
          fetch-depth: 0

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          # The retag action only needs yq; skip the rest of the toolset and
          # keep this job's cache separate from the full-install caches.
          install_args: yq
          cache: true
          cache_key_prefix: mise-yq-v1
          env: false

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          token_format: "access_token"
          workload_identity_provider: "projects/409661704476/locations/global/workloadIdentityPools/ga-pool/providers/github-oidc-provider"
          service_account: "speakeasy-registry-ga-ci@linen-analyst-344721.iam.gserviceaccount.com"

      - name: Tag preview image
        uses: ./.github/workflows/composite/tag-preview-images
        with:
          registry: ${{ env.REGISTRY }}
          image-owner: ${{ env.DOCKER_REPOSITORY_OWNER }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
          component: ${{ matrix.component }}
          filters: ${{ matrix.filters }}
          preview-tag: ${{ needs.changes.outputs.preview-tag }}

  format-check:
    name: Check formatting with hk
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1
        with:
          # Full history so hk can diff against the PR merge base.
          fetch-depth: 0

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: Cache PNPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: ${{ env.GH_CACHE_PNPM_KEY }}
          restore-keys: |
            ${{ env.GH_CACHE_PNPM_KEY }}
            ${{ env.GH_CACHE_PNPM_KEY_PARTIAL }}
          path: |
            ${{ env.PNPM_STORE_PATH }}

      # hk's oxfmt step shells out to `pnpm oxfmt`, so node_modules must exist.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            from_ref=$(git merge-base "$BASE_SHA" HEAD)
            echo "Checking files changed since merge base $from_ref"
            args=(--from-ref "$from_ref" --to-ref HEAD)
          else
            echo "Checking all files"
            args=(--all)
          fi
          if ! hk check "${args[@]}"; then
            echo "::error::Formatting check failed. Run 'hk fix --all' locally and commit the result."
            exit 1
          fi

      - name: Prune PNPM store
        if: success()
        run: pnpm store prune

  docker-build-server:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, server-build-lint]
    if: needs.changes.outputs.server == 'true'
    env:
      GOMAXPROCS: 4
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1

      - name: Download server build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: server-bin
          path: server/bin

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          token_format: "access_token"
          workload_identity_provider: "projects/409661704476/locations/global/workloadIdentityPools/ga-pool/providers/github-oidc-provider"
          service_account: "speakeasy-registry-ga-ci@linen-analyst-344721.iam.gserviceaccount.com"
      - name: Login to GCR
        env:
          GCR_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          max_attempts=3
          for ((i=1; i<=max_attempts; i++)); do
            echo "Docker login attempt $i/$max_attempts..."
            if docker login -u oauth2accesstoken --password-stdin gcr.io/linen-analyst-344721 <<< "$GCR_TOKEN"; then
              echo "Login successful"
              exit 0
            fi
            if [ $i -lt $max_attempts ]; then
              echo "Login failed, waiting 5s before retry..."
              sleep 5
            fi
          done
          echo "All login attempts failed"
          exit 1
      - name: Build and Push Registry image to GCR
        id: build
        uses: ./.github/workflows/composite/build-push
        with:
          hub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          hub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
          image: ${{ env.DOCKER_REPOSITORY_OWNER }}/gram
          context: ./server
          file: server/Dockerfile
          git-auth-token: ${{ secrets.BOT_REPO_TOKEN }}
          build-args: |
            GIT_USERNAME=speakeasybot
      - name: Pull and Run Image
        run: |
          echo "Pulling image: ${{ steps.build.outputs.image-tag }}"
          docker pull ${{ steps.build.outputs.image-tag }}
          echo "Running image..."
          docker run --rm ${{ steps.build.outputs.image-tag }} version

  docker-build-pystreams:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, pystreams-build-lint]
    if: needs.changes.outputs.pystreams == 'true'
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          token_format: "access_token"
          workload_identity_provider: "projects/409661704476/locations/global/workloadIdentityPools/ga-pool/providers/github-oidc-provider"
          service_account: "speakeasy-registry-ga-ci@linen-analyst-344721.iam.gserviceaccount.com"
      - name: Login to GCR
        env:
          GCR_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          max_attempts=3
          for ((i=1; i<=max_attempts; i++)); do
            echo "Docker login attempt $i/$max_attempts..."
            if docker login -u oauth2accesstoken --password-stdin gcr.io/linen-analyst-344721 <<< "$GCR_TOKEN"; then
              echo "Login successful"
              exit 0
            fi
            if [ $i -lt $max_attempts ]; then
              echo "Login failed, waiting 5s before retry..."
              sleep 5
            fi
          done
          echo "All login attempts failed"
          exit 1
      - name: Build and Push Registry image to GCR
        id: build
        uses: ./.github/workflows/composite/build-push
        with:
          hub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          hub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
          image: ${{ env.DOCKER_REPOSITORY_OWNER }}/gram-pystreams
          # The build context must be the uv workspace root: pystreams depends on
          # the in-repo gram-infra member and the single uv.lock lives there. The
          # build-scoped pystreams/Dockerfile.pystreams.dockerignore trims it down.
          context: .
          file: pystreams/Dockerfile.pystreams
          git-auth-token: ${{ secrets.BOT_REPO_TOKEN }}
      - name: Pull and Run Image
        run: |
          echo "Pulling image: ${{ steps.build.outputs.image-tag }}"
          docker pull ${{ steps.build.outputs.image-tag }}
          echo "Running image..."
          docker run --rm ${{ steps.build.outputs.image-tag }} --help

  assistant-runtime-image:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: needs.changes.outputs.server == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]')
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: Generate preview tag
        id: assistant-preview-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-8)
            echo "tag=pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute runtime image content hash
        id: assistant-runtime-hash
        shell: bash
        run: |
          set -euo pipefail
          hash=$(mise run hash:assistant-runtime-image)
          if [ -z "$hash" ]; then
            echo "runtime image hash is empty" >&2
            exit 1
          fi
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: "[DEV] Create fly app"
        id: assistantFlyCreateDev
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
          FLY_IMAGE: ${{ vars.FLY_ASSISTANT_IMAGE_DEV }}
        run: |
          mise run fly:init-runner \
            --org ${{ secrets.FLY_ORG_DEV }} \
            --image $FLY_IMAGE \
            --force

      - name: "[PROD] Create fly app"
        id: assistantFlyCreateProd
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
          FLY_IMAGE: ${{ vars.FLY_ASSISTANT_IMAGE_PROD }}
        run: |
          mise run fly:init-runner \
            --org ${{ secrets.FLY_ORG_PROD }} \
            --image $FLY_IMAGE \
            --force

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: assistantGcrAuth
        name: "Authenticate to Google Cloud"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          token_format: "access_token"
          workload_identity_provider: "projects/409661704476/locations/global/workloadIdentityPools/ga-pool/providers/github-oidc-provider"
          service_account: "speakeasy-registry-ga-ci@linen-analyst-344721.iam.gserviceaccount.com"

      - name: Login to GCR
        env:
          GCR_TOKEN: ${{ steps.assistantGcrAuth.outputs.access_token }}
        run: |
          max_attempts=3
          for ((i=1; i<=max_attempts; i++)); do
            echo "Docker login attempt $i/$max_attempts..."
            if docker login -u oauth2accesstoken --password-stdin gcr.io/linen-analyst-344721 <<< "$GCR_TOKEN"; then
              echo "Login successful"
              exit 0
            fi
            if [ $i -lt $max_attempts ]; then
              echo "Login failed, waiting 5s before retry..."
              sleep 5
            fi
          done
          echo "All login attempts failed"
          exit 1

      - name: Extract assistant runtime metadata for GCR
        id: assistantMetaGcr
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_REPOSITORY_OWNER }}/gram-assistant-runtime
          tags: |
            type=ref,event=branch,enable=${{ github.event_name != 'merge_group' }}
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=${{ steps.assistant-preview-tag.outputs.tag }},enable=${{ steps.assistant-preview-tag.outputs.enabled }}
            type=raw,value=${{ steps.assistant-runtime-hash.outputs.hash }}
            type=schedule,pattern=nightly
            type=sha
            type=sha,format=long

      - name: Build and push assistant runtime image to GCR
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./agents/runtime-image/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.assistantMetaGcr.outputs.tags }}
          labels: ${{ steps.assistantMetaGcr.outputs.labels }}

      - name: "[DEV] Login to Fly registry"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
        run: fly auth docker

      - name: "[DEV] Extract assistant runtime metadata"
        id: assistantMetaDev
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.assistantFlyCreateDev.outputs.flyAppRegistry }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name != 'merge_group' }}
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=${{ steps.assistant-preview-tag.outputs.tag }},enable=${{ steps.assistant-preview-tag.outputs.enabled }}
            type=raw,value=${{ steps.assistant-runtime-hash.outputs.hash }}
            type=schedule,pattern=nightly
            type=sha
            type=sha,format=long

      - name: "[DEV] Build and push assistant runtime image"
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./agents/runtime-image/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.assistantMetaDev.outputs.tags }}
          labels: ${{ steps.assistantMetaDev.outputs.labels }}

      - name: "[PROD] Login to Fly registry"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
        run: fly auth docker

      - name: "[PROD] Extract assistant runtime metadata"
        id: assistantMetaProd
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.assistantFlyCreateProd.outputs.flyAppRegistry }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name != 'merge_group' }}
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=${{ steps.assistant-preview-tag.outputs.tag }},enable=${{ steps.assistant-preview-tag.outputs.enabled }}
            type=raw,value=${{ steps.assistant-runtime-hash.outputs.hash }}
            type=schedule,pattern=nightly
            type=sha
            type=sha,format=long

      - name: "[PROD] Build and push assistant runtime image"
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./agents/runtime-image/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.assistantMetaProd.outputs.tags }}
          labels: ${{ steps.assistantMetaProd.outputs.labels }}

  otel-collector:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: needs.changes.outputs.otel-collector == 'true' && (github.event_name != 'pull_request' || (github.event.pull_request.user.login != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork))
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: "[DEV] Create fly app"
        id: collectorFlyCreateDev
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
          FLY_IMAGE: ${{ vars.FLY_OTEL_COLLECTOR_IMAGE_DEV }}
        run: |
          mise run fly:init-runner \
            --org ${{ secrets.FLY_ORG_DEV }} \
            --image $FLY_IMAGE \
            --force

      - name: "[PROD] Create fly app"
        id: collectorFlyCreateProd
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
          FLY_IMAGE: ${{ vars.FLY_OTEL_COLLECTOR_IMAGE_PROD }}
        run: |
          mise run fly:init-runner \
            --org ${{ secrets.FLY_ORG_PROD }} \
            --image $FLY_IMAGE \
            --force

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "[DEV] Login to Fly registry"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
        run: fly auth docker

      - name: "[DEV] Extract collector metadata"
        id: collectorMetaDev
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.collectorFlyCreateDev.outputs.flyAppRegistry }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name != 'merge_group' }}
            type=ref,event=pr
            type=sha
            type=sha,format=long

      - name: "[DEV] Build and push collector image"
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./otel-collector
          platforms: linux/amd64
          push: true
          tags: ${{ steps.collectorMetaDev.outputs.tags }}
          labels: ${{ steps.collectorMetaDev.outputs.labels }}

      - name: "[DEV] Deploy collector"
        if: github.event_name == 'push'
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
        run: |
          fly deploy \
            --app ${{ steps.collectorFlyCreateDev.outputs.flyAppName }} \
            --image ${{ steps.collectorFlyCreateDev.outputs.flyAppRegistry }}:sha-${{ github.sha }} \
            --config otel-collector/fly.toml \
            --yes

      - name: "[PROD] Login to Fly registry"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
        run: fly auth docker

      - name: "[PROD] Extract collector metadata"
        id: collectorMetaProd
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.collectorFlyCreateProd.outputs.flyAppRegistry }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name != 'merge_group' }}
            type=ref,event=pr
            type=sha
            type=sha,format=long

      - name: "[PROD] Build and push collector image"
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./otel-collector
          platforms: linux/amd64
          push: true
          tags: ${{ steps.collectorMetaProd.outputs.tags }}
          labels: ${{ steps.collectorMetaProd.outputs.labels }}

      - name: "[PROD] Deploy collector"
        if: github.event_name == 'push'
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
        run: |
          fly deploy \
            --app ${{ steps.collectorFlyCreateProd.outputs.flyAppName }} \
            --image ${{ steps.collectorFlyCreateProd.outputs.flyAppRegistry }}:sha-${{ github.sha }} \
            --config otel-collector/fly.toml \
            --yes

  golang-migrate-clickhouse:
    name: Test ClickHouse golang-migrate migrations
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.migrations == 'true' && github.event_name == 'pull_request'
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.8.3
        env:
          CLICKHOUSE_USER: gram
          CLICKHOUSE_PASSWORD: gram
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --user gram --password gram --query 'SELECT 1'"
          --health-interval 10s
          --health-start-period 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          env: false

      - name: Run ClickHouse migrations with golang-migrate
        env:
          CH_URL: clickhouse://127.0.0.1:9000/default?username=gram&password=gram&secure=false&x-multi-statement=true
        run: mise run clickhouse:migrate --engine golang-migrate --url ${CH_URL}

  atlas-lint:
    name: Lint migrations with Atlas
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.migrations == 'true' && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: dev
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-start-period 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1
        with:
          fetch-depth: 0

      - name: Setup Atlas
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0
        with:
          cloud-token: ${{ secrets.ATLAS_TOKEN }}

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          env: false

      - name: Run gram migration static checks
        shell: bash
        env:
          usage_git_base: origin/main
          usage_no_atlas: "true"
        run: bash .mise-tasks/lint/migrations.sh

      - name: Lint PostgreSQL migrations
        uses: ariga/atlas-action/migrate/lint@v1.15.6
        with:
          dir: file://server/migrations
          dir-name: gram
          dev-url: postgres://postgres:pass@localhost:5432/dev?search_path=public&sslmode=disable
          config: file://server/atlas.hcl
          git-base: origin/main
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Lint ClickHouse migrations
        uses: ariga/atlas-action/migrate/lint@v1.15.6
        with:
          dir: file://server/clickhouse/migrations
          dir-name: gram-clickhouse
          dev-url: docker://clickhouse/clickhouse-server/25.8.3/dev
          git-base: origin/main
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check migration state is clean
        shell: bash
        run: |
          failed=0

          mise run db:diff ci-drift-check
          pg_status="$(git status --porcelain -- server/migrations)"
          if [ -n "$pg_status" ]; then
            failed=1
            echo "::error::PostgreSQL migrations are out of sync with server/database/schema.sql"
            echo "Regenerating PostgreSQL migrations produced uncommitted changes:"
            echo "$pg_status"
            git add -N -- server/migrations
            git diff -- server/migrations
            echo ""
            echo "::error::Fix: run 'mise run db:diff <name>' locally and commit the generated migration and atlas.sum."
          fi

          mise run clickhouse:diff ci-drift-check
          ch_status="$(git status --porcelain -- server/clickhouse server/internal/telemetry/repo)"
          if [ -n "$ch_status" ]; then
            failed=1
            echo "::error::ClickHouse migrations are out of sync with server/clickhouse/schema.sql"
            echo "Regenerating ClickHouse migrations produced uncommitted changes."
            echo "This covers the Atlas dir (server/clickhouse/migrations), the golang-migrate dir"
            echo "(server/clickhouse/local/golang_migrate), and the generated materialized columns Go file:"
            echo "$ch_status"
            git add -N -- server/clickhouse server/internal/telemetry/repo
            git diff -- server/clickhouse server/internal/telemetry/repo
            echo ""
            echo "::error::Fix: run 'mise run clickhouse:diff <name>' locally and commit the generated files in both migration dirs."
          fi

          exit "$failed"

  atlas-push:
    name: Push migrations to Atlas Registry
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, server-build-lint]
    if: needs.changes.outputs.server == 'true' && github.event_name != 'merge_group'
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: atlas-push-${{ github.ref }}
      cancel-in-progress: true
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: dev
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-start-period 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1
        with:
          fetch-depth: 0

      - name: Setup Atlas
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0
        with:
          cloud-token: ${{ secrets.ATLAS_TOKEN }}

      - name: Generate tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-8)
            echo "tag=pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Push PostgreSQL migrations
        uses: ariga/atlas-action/migrate/push@v1.15.6
        with:
          dir: file://server/migrations
          dir-name: gram
          dev-url: postgres://postgres:pass@localhost:5432/dev?search_path=public&sslmode=disable
          tag: ${{ steps.tag.outputs.tag }}

      - name: Push ClickHouse migrations
        uses: ariga/atlas-action/migrate/push@v1.15.6
        with:
          dir: file://server/clickhouse/migrations
          dir-name: gram-clickhouse
          dev-url: docker://clickhouse/clickhouse-server/25.8.3/dev
          tag: ${{ steps.tag.outputs.tag }}

  webhooks-catalog-breaking-changes:
    name: Check webhooks catalog for breaking changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.webhooks-catalog == 'true' && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          env: false

      - name: Fetch main branch
        run: git fetch origin main

      - name: Check for breaking changes
        run: mise run lint:webhooks-server

      - name: Post review comment on breaking changes
        if: hashFiles('breaking-changes.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jq -n \
            --arg commit_id "${{ github.event.pull_request.head.sha }}" \
            --rawfile body breaking-changes.md \
            '{
              commit_id: $commit_id,
              subject_type: "file",
              path: "server/internal/outbox/events/catalog_gen.yaml",
              body: $body
            }' \
            | gh api \
                "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments" \
                --method POST \
                --input -

      - name: Fail on breaking changes
        if: hashFiles('breaking-changes.md') != ''
        run: |
          cat breaking-changes.md
          exit 1

  server-build-lint:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.server == 'true'
    env:
      GOMAXPROCS: 16
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: gram
          POSTGRES_PASSWORD: gram
          POSTGRES_DB: gram
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5439:5432
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: Cache Go
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: ${{ env.GH_CACHE_GO_KEY }}
          restore-keys: |
            ${{ env.GH_CACHE_GO_KEY }}
            ${{ env.GH_CACHE_GO_KEY_PARTIAL }}
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}

      - name: Compute runtime image content hash
        id: assistant-runtime-hash
        shell: bash
        run: |
          set -euo pipefail
          hash=$(mise run hash:assistant-runtime-image)
          if [ -z "$hash" ]; then
            echo "runtime image hash is empty" >&2
            exit 1
          fi
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GRAM_ASSISTANT_RUNTIME_IMAGE_HASH: ${{ steps.assistant-runtime-hash.outputs.hash }}
        run: mise run build:server --readonly

      - name: Build tunnel gateway
        run: mise run build:tunnel-gateway --readonly

      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          install-mode: none
          working-directory: server

      - name: Upload server build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-bin
          path: server/bin
          retention-days: 2

      - name: Install Go tools
        run: go install tool
        working-directory: server

        # TODO add speakeasy cli so the sdk can be generated
      - name: Run code generators
        run: mise run "gen:server"

      - name: Run "go mod tidy"
        run: mise run go:tidy

      - name: Setup Atlas
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0
        with:
          cloud-token: ${{ secrets.ATLAS_TOKEN }}

      - name: Run migrations
        run: mise run db:migrate
      - name: Diff database with schema
        run: mise run db:diff out-of-sync

      - name: Check for dirty files
        run: |
          mise run db:migrate --dry
          mise run git:porcelain

