name: Pull Request
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - main
  merge_group:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: gcr.io/linen-analyst-344721 #gcr for speakeasy-common gcr registry
  DOCKER_REPOSITORY_OWNER: ${{github.repository_owner}}
  NODE_OPTIONS: "--max-old-space-size=5120"

jobs:
  changes:
    name: Tag branch changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: "read"
      pull-requests: read
    outputs:
      server: ${{ steps.gates.outputs.server }}
      client: ${{ steps.gates.outputs.client }}
      cli: ${{ steps.gates.outputs.cli }}
      functions: ${{ steps.gates.outputs.functions }}
      tsframework: ${{ steps.gates.outputs.tsframework }}
      elements: ${{ steps.gates.outputs.elements }}
      migrations: ${{ steps.gates.outputs.migrations }}
      plog: ${{ steps.gates.outputs.plog }}
      sdk: ${{ steps.gates.outputs.sdk }}
      sdk-gen: ${{ steps.gates.outputs.sdk-gen }}
      risk_accuracy: ${{ steps.gates.outputs.risk_accuracy }}
      elements-examples: ${{ steps.list-elements-examples.outputs.examples }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        name: Check for changed packages
        id: filter
        with:
          filters: .github/filters.yaml
      - id: gates
        name: Set outputs
        env:
          HAS_PREVIEW_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'preview') }}
          HAS_FULL_CI_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'ci:full') }}
        run: |
          if [[ "${{ steps.filter.outputs.server }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_PREVIEW_LABEL" == "true" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "server=true" >> $GITHUB_OUTPUT
            echo "Server jobs will run."
          else
            echo "Server jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.client }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_PREVIEW_LABEL" == "true" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "client=true" >> $GITHUB_OUTPUT
            echo "Client jobs will run."
          else
            echo "Client jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.cli }}" == "true" || "${{ github.ref }}" ==  "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "cli=true" >> $GITHUB_OUTPUT
            echo "CLI jobs will run."
          else
            echo "CLI jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.functions }}" == "true" || "${{ github.ref }}" ==  "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "functions=true" >> $GITHUB_OUTPUT
            echo "Functions jobs will run."
          else
            echo "Functions jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.tsframework }}" == "true" || "${{ github.ref }}" ==  "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "tsframework=true" >> $GITHUB_OUTPUT
            echo "TypeScript framework jobs will run."
          else
            echo "TypeScript framework jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.elements }}" == "true" || "${{ github.ref }}" ==  "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "elements=true" >> $GITHUB_OUTPUT
            echo "Elements jobs will run."
          else
            echo "Elements jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.migrations }}" == "true" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "migrations=true" >> $GITHUB_OUTPUT
            echo "Migrations jobs will run."
          else
            echo "Migrations jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.plog }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "plog=true" >> $GITHUB_OUTPUT
            echo "Plog jobs will run."
          else
            echo "Plog jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.sdk }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "sdk=true" >> $GITHUB_OUTPUT
            echo "SDK jobs will run."
          else
            echo "SDK jobs will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.sdk-gen }}" == "true" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "merge_group" || "$HAS_PREVIEW_LABEL" == "true" || "$HAS_FULL_CI_LABEL" == "true" ]]; then
            echo "sdk-gen=true" >> $GITHUB_OUTPUT
            echo "SDK generation check will run."
          else
            echo "SDK generation check will be skipped."
          fi

          if [[ "${{ steps.filter.outputs.risk_accuracy }}" == "true" ]]; then
            echo "risk_accuracy=true" >> $GITHUB_OUTPUT
            echo "Risk accuracy comment job will run."
          else
            echo "Risk accuracy comment job will be skipped."
          fi
      - id: list-elements-examples
        name: List elements examples
        run: |
          examples=$(ls -d elements/examples/*/package.json 2>/dev/null | xargs -I{} dirname {} | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "examples=$examples" >> $GITHUB_OUTPUT

  docker-build-server:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, server-build-lint]
    if: needs.changes.outputs.server == 'true'
    env:
      GOMAXPROCS: 4
    steps:
      - name: Checkout
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0

      - name: Download server build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: server-bin
          path: server/bin

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          token_format: "access_token"
          workload_identity_provider: "projects/409661704476/locations/global/workloadIdentityPools/ga-pool/providers/github-oidc-provider"
          service_account: "speakeasy-registry-ga-ci@linen-analyst-344721.iam.gserviceaccount.com"
      - name: Login to GCR
        env:
          GCR_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          max_attempts=3
          for ((i=1; i<=max_attempts; i++)); do
            echo "Docker login attempt $i/$max_attempts..."
            if docker login -u oauth2accesstoken --password-stdin gcr.io/linen-analyst-344721 <<< "$GCR_TOKEN"; then
              echo "Login successful"
              exit 0
            fi
            if [ $i -lt $max_attempts ]; then
              echo "Login failed, waiting 5s before retry..."
              sleep 5
            fi
          done
          echo "All login attempts failed"
          exit 1
      - name: Build and Push Registry image to GCR
        id: build
        uses: ./.github/workflows/composite/build-push
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
          image: ${{ env.DOCKER_REPOSITORY_OWNER }}/gram
          context: ./server
          file: server/Dockerfile
          git-auth-token: ${{ secrets.BOT_REPO_TOKEN }}
          build-args: |
            GIT_USERNAME=speakeasybot
      - name: Pull and Run Image
        run: |
          echo "Pulling image: ${{ steps.build.outputs.image-tag }}"
          docker pull ${{ steps.build.outputs.image-tag }}
          echo "Running image..."
          docker run --rm ${{ steps.build.outputs.image-tag }} version

  assistant-runtime-image:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: needs.changes.outputs.server == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]')
    steps:
      - name: Checkout
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: Generate preview tag
        id: assistant-preview-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-8)
            echo "tag=pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: "[DEV] Create fly app"
        id: assistantFlyCreateDev
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
          FLY_IMAGE: ${{ vars.FLY_ASSISTANT_IMAGE_DEV }}
        run: |
          mise run fly:init-runner \
            --org ${{ secrets.FLY_ORG_DEV }} \
            --image $FLY_IMAGE \
            --force

      - name: "[PROD] Create fly app"
        id: assistantFlyCreateProd
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
          FLY_IMAGE: ${{ vars.FLY_ASSISTANT_IMAGE_PROD }}
        run: |
          mise run fly:init-runner \
            --org ${{ secrets.FLY_ORG_PROD }} \
            --image $FLY_IMAGE \
            --force

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: "[DEV] Login to Fly registry"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
        run: fly auth docker

      - name: "[DEV] Extract assistant runtime metadata"
        id: assistantMetaDev
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.assistantFlyCreateDev.outputs.flyAppRegistry }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name != 'merge_group' }}
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=${{ steps.assistant-preview-tag.outputs.tag }},enable=${{ steps.assistant-preview-tag.outputs.enabled }}
            type=schedule,pattern=nightly
            type=sha
            type=sha,format=long

      - name: "[DEV] Build and push assistant runtime image"
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./agents/runtime-image/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.assistantMetaDev.outputs.tags }}
          labels: ${{ steps.assistantMetaDev.outputs.labels }}

      - name: "[PROD] Login to Fly registry"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
        run: fly auth docker

      - name: "[PROD] Extract assistant runtime metadata"
        id: assistantMetaProd
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.assistantFlyCreateProd.outputs.flyAppRegistry }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name != 'merge_group' }}
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=${{ steps.assistant-preview-tag.outputs.tag }},enable=${{ steps.assistant-preview-tag.outputs.enabled }}
            type=schedule,pattern=nightly
            type=sha
            type=sha,format=long

      - name: "[PROD] Build and push assistant runtime image"
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./agents/runtime-image/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.assistantMetaProd.outputs.tags }}
          labels: ${{ steps.assistantMetaProd.outputs.labels }}

  atlas-lint:
    name: Lint migrations with Atlas
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.migrations == 'true' && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: dev
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-start-period 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0
        with:
          fetch-depth: 0

      - name: Setup Atlas
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0
        with:
          cloud-token: ${{ secrets.ATLAS_TOKEN }}

      - name: Run gram migration static checks
        shell: bash
        env:
          usage_git_base: origin/main
          usage_no_atlas: "true"
        run: bash .mise-tasks/lint/migrations.sh

      - name: Lint PostgreSQL migrations
        uses: ariga/atlas-action/migrate/lint@v1.14.5
        with:
          dir: file://server/migrations
          dir-name: gram
          dev-url: postgres://postgres:pass@localhost:5432/dev?search_path=public&sslmode=disable
          config: file://server/atlas.hcl
          git-base: origin/main
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Lint ClickHouse migrations
        uses: ariga/atlas-action/migrate/lint@v1.14.5
        with:
          dir: file://server/clickhouse/migrations
          dir-name: gram-clickhouse
          dev-url: docker://clickhouse/clickhouse-server/25.8.3/dev
          git-base: origin/main
        env:
          GITHUB_TOKEN: ${{ github.token }}

  atlas-push:
    name: Push migrations to Atlas Registry
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, server-build-lint]
    if: needs.changes.outputs.server == 'true' && github.event_name != 'merge_group'
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: atlas-push-${{ github.ref }}
      cancel-in-progress: true
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: dev
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-start-period 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0
        with:
          fetch-depth: 0

      - name: Setup Atlas
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0
        with:
          cloud-token: ${{ secrets.ATLAS_TOKEN }}

      - name: Generate tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-8)
            echo "tag=pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Push PostgreSQL migrations
        uses: ariga/atlas-action/migrate/push@v1.14.5
        with:
          dir: file://server/migrations
          dir-name: gram
          dev-url: postgres://postgres:pass@localhost:5432/dev?search_path=public&sslmode=disable
          tag: ${{ steps.tag.outputs.tag }}

      - name: Push ClickHouse migrations
        uses: ariga/atlas-action/migrate/push@v1.14.5
        with:
          dir: file://server/clickhouse/migrations
          dir-name: gram-clickhouse
          dev-url: docker://clickhouse/clickhouse-server/25.8.3/dev
          tag: ${{ steps.tag.outputs.tag }}

  server-build-lint:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.server == 'true'
    env:
      GOMAXPROCS: 16
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: gram
          POSTGRES_PASSWORD: gram
          POSTGRES_DB: gram
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5439:5432
    steps:
      - name: Checkout
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: Cache Go
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ env.GH_CACHE_GO_KEY }}
          restore-keys: |
            ${{ env.GH_CACHE_GO_KEY }}
            ${{ env.GH_CACHE_GO_KEY_PARTIAL }}
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}

      - name: Build
        run: mise run build:server --readonly

      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          install-mode: none
          working-directory: server

      - name: Upload server build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-bin
          path: server/bin
          retention-days: 2

      - name: Install Go tools
        run: go install tool
        working-directory: server

        # TODO add speakeasy cli so the sdk can be generated
      - name: Run code generators
        run: mise run "gen:server"

      - name: Run "go mod tidy"
        run: mise run go:tidy

      - name: Setup Atlas
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0
        with:
          cloud-token: ${{ secrets.ATLAS_TOKEN }}

      - name: Run migrations
        run: mise run db:migrate
      - name: Diff database with schema
        run: mise run db:diff out-of-sync

      - name: Check for dirty files
        run: |
          mise run db:migrate --dry
          mise run git:porcelain

  cli-build-lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    env:
      GOMAXPROCS: 4
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: gram
          POSTGRES_PASSWORD: gram
          POSTGRES_DB: gram
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5439:5432
    steps:
      - name: Checkout
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: Cache Go
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ env.GH_CACHE_GO_KEY }}
          restore-keys: |
            ${{ env.GH_CACHE_GO_KEY }}
            ${{ env.GH_CACHE_GO_KEY_PARTIAL }}
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}

      - name: Build
        run: mise run build:cli --readonly

      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          install-mode: none
          working-directory: cli

      - name: Install Go tools
        run: go install tool
        working-directory: cli

        # TODO add speakeasy cli so the sdk can be generated
      - name: Run code generators
        run: mise run "gen:server"

      - name: Run "go mod tidy"
        run: mise run go:tidy

      - name: Check for dirty files
        run: mise run git:porcelain

  plog-build-lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.plog == 'true'
    env:
      GOMAXPROCS: 4
    steps:
      - name: Checkout
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: Cache Go
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ env.GH_CACHE_GO_KEY }}
          restore-keys: |
            ${{ env.GH_CACHE_GO_KEY }}
            ${{ env.GH_CACHE_GO_KEY_PARTIAL }}
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}

      - name: Install Go tools
        run: go install tool
        working-directory: plog

      - name: Build
        run: mise run build:plog --readonly

      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          install-mode: none
          working-directory: plog

      - name: Test
        run: mise run test:plog

      - name: Run "go mod tidy"
        run: mise run go:tidy

      - name: Check for dirty files
        run: mise run git:porcelain

  server-test:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.server == 'true'
    env:
      GOMAXPROCS: 8
    steps:
      - name: Checkout
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: Cache Go
