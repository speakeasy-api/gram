          svix-api-key: ${{ secrets.SVIX_SYNC_KEY_US_DEV }}
          replace-all: true
      - name: Upload event types to Svix (prod)
        uses: svix/svix-event-type-import-action@4e3a9d81b05db38e57187434b6b291e1fef50250 # v1.2.0
        with:
          openapi-file: ${{ env.SVIX_OPENAPI_FILE }}
          svix-api-key: ${{ secrets.SVIX_SYNC_KEY_US_PROD }}
          replace-all: true

  dispatch-release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      [
        ci-gate,
        docker-build-server,
        assistant-runtime-image,
        svix-sync-webhooks,
      ]
    # ci-gate's transitive needs include path-filtered jobs, and a skipped job
    # anywhere in the needs chain skips dependents under the default success()
    # condition even when every direct need succeeded. !cancelled() opts out of
    # that propagation, so each need's result must be checked explicitly: ci-gate
    # green gates the release, and the image/sync jobs succeeding (not skipped)
    # keeps docs-only pushes from dispatching one.
    if: >-
      !cancelled() &&
      needs.ci-gate.result == 'success' &&
      needs.docker-build-server.result == 'success' &&
      needs.assistant-runtime-image.result == 'success' &&
      needs.svix-sync-webhooks.result == 'success' &&
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.GRAM_BOT_APP_ID }}
          private-key: ${{ secrets.GRAM_BOT_PRIVATE_KEY }}
          owner: speakeasy-api
          repositories: gram-infra
      - name: Dispatch prepare-release
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh workflow run "Prepare Release" \
            -R speakeasy-api/gram-infra \
            -f environment=dev \
            -f commit_hash=${{ github.sha }}

  tunnel-agent:
    name: Tunnel agent
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: needs.changes.outputs.tunnel == 'true'
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@6fd481652155169ed4d2f25ebaf97464f685175f # v1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: tunnel/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=0.0.0-pr
