        with:
          key: ${{ env.GH_CACHE_GO_KEY }}
          restore-keys: |
            ${{ env.GH_CACHE_GO_KEY }}
            ${{ env.GH_CACHE_GO_KEY_PARTIAL }}
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}

      - name: Install Go deps & pre-pull test images
        run: |
          docker pull mcr.microsoft.com/presidio-analyzer:2.2.362 &
          mise run install:go
          wait

      - name: Test
        run: mise run test:server

      - name: Upload risk accuracy metrics
        if: always() && hashFiles('server/risk_accuracy_metrics.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-accuracy-metrics
          path: server/risk_accuracy_metrics.json
          retention-days: 365

  risk-accuracy-comment:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [changes, server-test]
    if: |
      !cancelled() &&
      needs.changes.outputs.risk_accuracy == 'true' &&
      github.event_name == 'pull_request' &&
      (needs.server-test.result == 'success' || needs.server-test.result == 'failure')
    permissions:
      contents: read
      pull-requests: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0

      - name: Download PR metrics artifact
        id: download-pr
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: risk-accuracy-metrics
          path: ./pr-metrics

      - name: Skip if PR artifact missing
        id: gate
        run: |
          if [ ! -f ./pr-metrics/risk_accuracy_metrics.json ]; then
            echo "no PR artifact (server-test likely failed before producing one); skipping comment"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download main baseline metrics
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -uo pipefail
          mkdir -p ./main-metrics
          MAIN_RUN_ID=$(gh run list \
            --branch main \
            --workflow pr.yaml \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -z "$MAIN_RUN_ID" ]; then
            echo "no successful main run found; will report without baseline"
            exit 0
          fi
          if ! gh run download "$MAIN_RUN_ID" -n risk-accuracy-metrics -D ./main-metrics 2>/dev/null; then
            echo "main run $MAIN_RUN_ID has no risk-accuracy-metrics artifact (likely a run before this feature shipped); will report without baseline"
            rm -rf ./main-metrics
            mkdir -p ./main-metrics
          fi

      - name: Render comment body
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          MAIN_FILE=""
          if [ -f ./main-metrics/risk_accuracy_metrics.json ]; then
            MAIN_FILE=./main-metrics/risk_accuracy_metrics.json
          fi
          .github/scripts/risk-metrics-comment.sh \
            ./pr-metrics/risk_accuracy_metrics.json \
            "$MAIN_FILE" > body.md

      - name: Post or update sticky comment
        if: steps.gate.outputs.skip != 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          MARKER='<!-- risk-accuracy-metrics -->'
          EXISTING=$(gh api -X GET \
            "repos/$REPO/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" \
            | head -1 || true)
          if [ -n "${EXISTING:-}" ]; then
            echo "updating existing comment $EXISTING"
            jq -Rs '{body: .}' body.md \
              | gh api -X PATCH "repos/$REPO/issues/comments/$EXISTING" --input -
          else
            echo "creating new comment"
            gh pr comment "$PR_NUMBER" --body-file body.md
          fi

  docker-build-client:
    runs-on: blacksmith-4vcpu-ubuntu-2404
