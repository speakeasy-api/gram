      - name: Prune PNPM store
        if: success()
        run: pnpm store prune

  elements-examples:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.elements == 'true'
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJSON(needs.changes.outputs.elements-examples) }}
    steps:
      - name: Checkout
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          env: false

      - name: Prepare GitHub Actions environment
        run: mise run github

      - name: Cache PNPM
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ env.GH_CACHE_PNPM_KEY }}
          restore-keys: |
            ${{ env.GH_CACHE_PNPM_KEY }}
            ${{ env.GH_CACHE_PNPM_KEY_PARTIAL }}
          path: |
            ${{ env.PNPM_STORE_PATH }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build elements library
        run: pnpm build
        working-directory: elements

      - name: Type check
        run: pnpm run check
        working-directory: elements/examples/${{ matrix.example }}

      - name: Build example
        run: pnpm run build:example
        working-directory: elements/examples/${{ matrix.example }}
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Prune PNPM store
        if: success()
        run: pnpm store prune

  # Gate job: aggregates all check results into a single required status check.
  # This allows domain-specific jobs to skip (via job-level `if`) without blocking
  # merge, since skipped jobs don't report a status to rulesets.
  ci-gate:
    name: CI Gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: always()
    needs:
      - changes
      - server-build-lint
      - server-test
      - docker-build-server
      - docker-build-client
      - client-build-lint
      - sdk-gen-check
      - ts-sdk-build-lint
      - cli-build-lint
      - plog-build-lint
      - functions-build-host
      - functions-image
      - assistant-runtime-image
      - ts-framework-test
      - elements-build-lint
      - elements-test
      - elements-examples
      - atlas-lint
      - atlas-push
    steps:
      - name: Check results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed_output=$(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | "❌ \(.key) (\(.value.result))"') || { echo "Error: jq command failed"; exit 1; }
          failed=()
          while IFS= read -r line; do
            [[ -n "$line" ]] && failed+=("$line")
          done <<< "$failed_output"

          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "CI failed. The following checks did not pass:"
            for item in "${failed[@]}"; do
              echo "  $item"
            done
            exit 1
          fi

          echo "✅ All CI checks passed or were skipped."

  dispatch-release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [docker-build-server, assistant-runtime-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.GRAM_BOT_APP_ID }}
          private-key: ${{ secrets.GRAM_BOT_PRIVATE_KEY }}
          owner: speakeasy-api
          repositories: gram-infra
      - name: Dispatch prepare-release
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh workflow run "Prepare Release" \
            -R speakeasy-api/gram-infra \
            -f environment=dev \
            -f commit_hash=${{ github.sha }}
