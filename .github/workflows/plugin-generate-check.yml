name: Plugin Generate Check

on:
  pull_request:
    paths:
      - "hooks/**"
      - "server/internal/plugins/generate.go"

jobs:
  check-generate-updated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check that plugins/generate.go was updated
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          CHANGED_FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD)

          HOOKS_CHANGED=$(echo "$CHANGED_FILES" | grep -E '^hooks/' || true)
          GENERATE_CHANGED=$(echo "$CHANGED_FILES" | grep -E '^server/internal/plugins/generate\.go$' || true)

          if [ -n "$HOOKS_CHANGED" ] && [ -z "$GENERATE_CHANGED" ]; then
            echo "❌ Error: hooks/ was modified but server/internal/plugins/generate.go was not updated"
            echo ""
            echo "Changed files under hooks/:"
            echo "$HOOKS_CHANGED"
            echo ""
            echo "Please update server/internal/plugins/generate.go to reflect the hook changes."
            exit 1
          fi

          echo "✅ server/internal/plugins/generate.go was updated alongside hooks/ changes"

      - name: Remind to consider a generator version bump
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # generate.go drives the plugin fingerprint that the automated rollout
          # uses to skip unchanged projects. Output-affecting changes are caught
          # automatically by the content hash, so we do NOT force a bump on every
          # edit — that would invalidate every project's fingerprint and trigger
          # a full republish (fresh keys + commits) for no reason. This is a
          # non-blocking nudge for the rare case where generation BEHAVIOUR
          # changes in a way the placeholder fingerprint pass can't observe.
          GENERATE_DIFF=$(git diff "origin/$BASE_REF"...HEAD -- server/internal/plugins/generate.go)
          if [ -z "$GENERATE_DIFF" ]; then
            echo "generate.go unchanged; nothing to check."
            exit 0
          fi

          VERSION_BUMPED=$(echo "$GENERATE_DIFF" | grep -E '^\+[[:space:]]*const pluginGeneratorVersion' || true)
          if [ -n "$VERSION_BUMPED" ]; then
            echo "✅ pluginGeneratorVersion was bumped."
            exit 0
          fi

          echo "::notice file=server/internal/plugins/generate.go::generate.go changed without bumping pluginGeneratorVersion. If this change alters generation behaviour in a way the fingerprint's placeholder pass can't observe (and you want every project republished on the next rollout), bump the const. Output-visible changes are detected automatically and need no bump."
