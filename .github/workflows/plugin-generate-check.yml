name: Plugin Generate Check

on:
  pull_request:
    paths:
      - "hooks/**"
      - "server/internal/plugins/generate.go"

jobs:
  check-generate-updated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check that plugins/generate.go was updated
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          CHANGED_FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD)

          HOOKS_CHANGED=$(echo "$CHANGED_FILES" | grep -E '^hooks/' | grep -v -E '^hooks/plugin-claude-test/' || true)
          GENERATE_CHANGED=$(echo "$CHANGED_FILES" | grep -E '^server/internal/plugins/generate\.go$' || true)

          if [ -n "$HOOKS_CHANGED" ] && [ -z "$GENERATE_CHANGED" ]; then
            echo "❌ Error: hooks/ was modified but server/internal/plugins/generate.go was not updated"
            echo ""
            echo "Changed production hook files:"
            echo "$HOOKS_CHANGED"
            echo ""
            echo "Please update server/internal/plugins/generate.go to reflect the hook changes."
            exit 1
          fi

          echo "✅ server/internal/plugins/generate.go was updated alongside hooks/ changes"

      - name: Check generator version bumps
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          GENERATE_DIFF=$(git diff "origin/$BASE_REF"...HEAD -- server/internal/plugins/generate.go)
          CHANGED_FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD)
          HOOKS_CHANGED=$(echo "$CHANGED_FILES" | grep -E '^hooks/' | grep -v -E '^hooks/plugin-claude-test/' || true)

          HOOKS_BUMPED=$(echo "$GENERATE_DIFF" | grep -E '^\+[[:space:]]*const hooksGeneratorVersion' || true)
          MCP_BUMPED=$(echo "$GENERATE_DIFF" | grep -E '^\+[[:space:]]*const mcpGeneratorVersion' || true)

          # The observability (hooks) plugin has no content fingerprint: the rollout
          # republishes it ONLY when hooksGeneratorVersion is bumped. So any change to
          # the embedded hook scripts (hooks/**) MUST bump the const, or the change
          # would never roll out to connected repos. Blocking.
          if [ -n "$HOOKS_CHANGED" ] && [ -z "$HOOKS_BUMPED" ]; then
            echo "❌ Error: hooks/ changed but hooksGeneratorVersion was not bumped."
            echo "The hooks plugin only republishes on a hooksGeneratorVersion bump, so this change would never reach users."
            echo ""
            echo "Changed hook files:"
            echo "$HOOKS_CHANGED"
            echo ""
            echo "Bump hooksGeneratorVersion in server/internal/plugins/generate.go."
            exit 1
          fi

          # The MCP fingerprint catches output-visible MCP changes automatically, so
          # we do NOT force an mcpGeneratorVersion bump on every edit — that would
          # invalidate every project's fingerprint and trigger a full MCP republish
          # (fresh keys + commits) for no reason. Non-blocking nudge for MCP
          # behaviour changes the placeholder fingerprint pass can't observe.
          if [ -n "$GENERATE_DIFF" ] && [ -z "$MCP_BUMPED" ]; then
            echo "::notice file=server/internal/plugins/generate.go::generate.go changed without bumping mcpGeneratorVersion. If this alters MCP generation behaviour in a way the fingerprint's placeholder pass can't observe (and you want every project's MCP plugins republished on the next rollout), bump mcpGeneratorVersion. Output-visible MCP changes are detected automatically and need no bump."
          fi

          echo "✅ Generator version checks passed."
