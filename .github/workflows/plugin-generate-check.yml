name: Plugin Generate Check

on:
  pull_request:
    paths:
      - "server/internal/plugins/**"
      - "server/cmd/export-hook-plugin/**"

jobs:
  check-generator-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"
          # Reference: https://github.com/actions/setup-go/issues/495
          cache: false

      - name: Require a hooksGeneratorVersion bump when hook plugin output changes
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # The observability (hooks) plugin has no content fingerprint: the
          # rollout republishes it ONLY when hooksGeneratorVersion is bumped.
          # Nothing is checked in to diff anymore, so render the hook plugins
          # from both the merge base and this PR and compare the trees — any
          # output change MUST come with a bump or it would never roll out to
          # connected repos. Blocking.
          git fetch origin "$BASE_REF"
          BASE=$(git merge-base "origin/$BASE_REF" HEAD)

          HEAD_OUT=$(mktemp -d)
          (cd server && go run ./cmd/export-hook-plugin -out "$HEAD_OUT")

          BASE_TREE=$(mktemp -d)
          git worktree add --detach "$BASE_TREE" "$BASE"
          BASE_OUT=$(mktemp -d)
          if [ -d "$BASE_TREE/server/cmd/export-hook-plugin" ]; then
            (cd "$BASE_TREE/server" && go run ./cmd/export-hook-plugin -out "$BASE_OUT")
          fi
          git worktree remove --force "$BASE_TREE"

          hooks_version() {
            git show "${1}:server/internal/plugins/generate.go" 2>/dev/null \
              | grep -E '^[[:space:]]*const hooksGeneratorVersion' || true
          }

          if diff -r "$BASE_OUT" "$HEAD_OUT" > /dev/null; then
            echo "Rendered hook plugins are unchanged; no bump needed."
            exit 0
          fi

          if [ "$(hooks_version "$BASE")" = "$(hooks_version HEAD)" ]; then
            echo "❌ Error: the rendered hook plugins changed but hooksGeneratorVersion was not bumped."
            echo "The hooks plugin only republishes on a hooksGeneratorVersion bump, so this change would never reach users."
            echo ""
            echo "Changed rendered files:"
            diff -rq "$BASE_OUT" "$HEAD_OUT" || true
            echo ""
            echo "Bump hooksGeneratorVersion in server/internal/plugins/generate.go."
            exit 1
          fi

          echo "✅ Rendered hook plugins changed and hooksGeneratorVersion was bumped."

      - name: Remind to consider an mcpGeneratorVersion bump
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # The MCP fingerprint catches output-visible MCP changes
          # automatically, so we do NOT force an mcpGeneratorVersion bump on
          # every edit — that would invalidate every project's fingerprint and
          # trigger a full MCP republish (fresh keys + commits) for no reason.
          # Non-blocking nudge, keyed on the git hashes of the generator
          # sources, for MCP behaviour changes the placeholder fingerprint
          # pass can't observe.
          BASE=$(git merge-base "origin/$BASE_REF" HEAD)

          # A vanished path hashes to a distinct sentinel so renames and
          # deletions register as a change rather than an error.
          generator_tree_hash() {
            git rev-parse \
              "${1}:server/internal/plugins/generate.go" \
              "${1}:server/internal/plugins/hook_adapters.go" \
              "${1}:server/internal/plugins/naming" \
              2>/dev/null || echo "unresolvable:${1}"
          }

          if [ "$(generator_tree_hash "$BASE")" = "$(generator_tree_hash HEAD)" ]; then
            echo "Plugin generator sources unchanged; nothing to check."
            exit 0
          fi

          mcp_version() {
            git show "${1}:server/internal/plugins/generate.go" 2>/dev/null \
              | grep -E '^[[:space:]]*const mcpGeneratorVersion' || true
          }

          if [ "$(mcp_version "$BASE")" != "$(mcp_version HEAD)" ]; then
            echo "✅ mcpGeneratorVersion was bumped."
            exit 0
          fi

          echo "::notice file=server/internal/plugins/generate.go::Plugin generator sources changed without bumping mcpGeneratorVersion. If this alters MCP generation behaviour in a way the fingerprint's placeholder pass can't observe (and you want every project's MCP plugins republished on the next rollout), bump mcpGeneratorVersion. Output-visible MCP changes are detected automatically and need no bump."
