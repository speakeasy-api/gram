# Fixed project name so all git worktrees share the same infra containers
# instead of each worktree creating its own set and causing port conflicts.
name: ${COMPOSE_PROJECT_NAME:-gram}

services:
  gram-db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts run only on FIRST container start (empty data volume).
      # Currently used to create the gram_devidp database for the dev-idp
      # binary; see local/postgres-init/01-create-gram-devidp.sql.
      - ./local/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
  gram-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - cache_data:/var/lib/gram-cache/data
    ports:
      - "${GRAM_REDIS_CACHE_PORT}:35299"
    command: redis-server --port 35299 --requirepass xi9XILbY

  gram-temporal:
    image: temporalio/server:1.27.2
    restart: unless-stopped
    ports:
      - "${TEMPORAL_PORT}:7233"
      - "${TEMPORAL_WEB_PORT}:8233"
    entrypoint: ["temporal"]
    command:
      [
        "server",
        "start-dev",
        "--ip",
        "${TEMPORAL_IP:-0.0.0.0}",
        "--ui-ip",
        "${TEMPORAL_IP:-0.0.0.0}",
        "--namespace",
        "default",
        "--db-filename",
        "/home/temporal/dev.db",
      ]
    volumes:
      - temporal_data:/home/temporal
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 5s
      timeout: 30s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    restart: unless-stopped
    volumes:
      - ./local/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTLP_GRPC_PORT}:4317"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/jaeger:2.17.0
    restart: unless-stopped
    ports:
      - "${JAEGER_WEB_PORT}:16686"

  prometheus:
    image: prom/prometheus:v3.4.0
    restart: unless-stopped
    volumes:
      - ./local/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    depends_on:
      - otel-collector

  clickhouse:
    build:
      context: ./local/clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT}:8123"
      - "${CLICKHOUSE_NATIVE_PORT}:9440"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: gram
      CLICKHOUSE_PASSWORD: gram
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    mem_limit: 2g
    memswap_limit: 2g
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  pubsub-emulator:
    image: google/cloud-sdk:489.0.0-emulators
    ports:
      - "${PUBSUB_EMULATOR_PORT}:8085"
    command:
      [
        "gcloud",
        "beta",
        "emulators",
        "pubsub",
        "start",
        "--host-port=0.0.0.0:8085",
      ]

  gram-presidio:
    image: mcr.microsoft.com/presidio-analyzer:2.2.362
    restart: unless-stopped
    ports:
      - "${PRESIDIO_PORT}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-registry-db:
    profiles: [local-registry]
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcp_registry
      POSTGRES_PASSWORD: mcp_registry
      POSTGRES_DB: mcp_registry
    volumes:
      - mcp_registry_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_registry"]
      interval: 5s
      timeout: 5s
      retries: 5
  mcp-registry:
    profiles: [local-registry]
    image: ghcr.io/modelcontextprotocol/registry:1.3.10
    restart: unless-stopped
    environment:
      MCP_REGISTRY_DATABASE_URL: postgresql://mcp_registry:mcp_registry@mcp-registry-db:5432/mcp_registry
      MCP_REGISTRY_JWT_PRIVATE_KEY: ffb75d70bdacadee50324c5f93b04e5674b1df37b4e234e603e5c08500eb0740
      MCP_REGISTRY_ENABLE_ANONYMOUS_AUTH: "true"
    ports:
      - "${LOCAL_MCP_REGISTRY_PORT}:8080"
    depends_on:
      mcp-registry-db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  cache_data:
    driver: local
  temporal_data:
    driver: local
  clickhouse_data:
    driver: local
  prometheus_data:
    driver: local
  mcp_registry_data:
    driver: local
