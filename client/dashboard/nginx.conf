server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # When GRAM_CDN_URL is set (e.g. https://cdn.dev.getgram.ai), rewrite
    # asset URLs in HTML responses so browsers fetch static assets through
    # the CDN. This file ships as an envsubst template (see Dockerfile): the
    # nginx entrypoint substitutes ${GRAM_CDN_URL} at container start, and
    # with it empty the rewrite is a no-op and assets stay same-origin. Only
    # HTML is rewritten (sub_filter_types defaults to text/html); JS and CSS
    # reference their sub-resources relative to their own URL, so they follow
    # automatically (see renderBuiltUrl in vite.config.ts).
    sub_filter_once off;
    sub_filter '"/assets/' '"${GRAM_CDN_URL}/assets/';

    # Serve JS under /external with CORS enabled
    location ~* ^/external/.+\.js$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Serve static assets with an efficient cache policy. Note: with
    # GRAM_CDN_URL set, browsers fetch /assets from the CDN, whose origin is
    # a GCS bucket rather than this nginx (see cdn.tf / cdn-bucket.tf in
    # gram-infra); the LB there sets its own Access-Control-Allow-Origin: *,
    # mirroring the header here. These headers still cover anything served
    # directly from this container: CDN disabled (GRAM_CDN_URL empty), local
    # runs, or clients hitting the origin host. Vite emits
    # <script type="module" crossorigin> and stylesheet links, and devtools
    # fetch sourcemaps in CORS mode, so cross-origin consumers need the
    # header or the fetch fails with a NetworkError.
    location ~* \.(js|css|map)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Serve HTML with no cache
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
