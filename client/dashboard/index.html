<!doctype html>
<html lang="en" class="dark:scheme-dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="favicon" href="/favicon.png" />
    <link rel="alternate icon" id="favicon-alt" href="/favicon.ico" />

    <!-- Apply the theme class before first paint to avoid a flash of the
         wrong theme on load. Mirrors App.tsx (key: "preferred-theme",
         default: light). Keep these in sync. -->
    <script src="/src/theme-init.ts" vite-ignore></script>

    <meta property="og:title" content="Speakeasy AI Control Plane" />
    <meta
      property="og:description"
      content="A control plane to connect, secure and scale AI usage across your organization."
    />
    <meta
      property="og:image"
      content="https://app.getgram.ai/og-image.png?v=1"
    />
    <meta property="og:url" content="https://app.getgram.ai" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Speakeasy" />
    <meta property="og:locale" content="en_US" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://widget.usepylon.com" crossorigin />
    <link
      rel="preconnect"
      href="https://browser-intake-datadoghq.com"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://static.clairedefermat.com"
      crossorigin
    />
    <!-- Fonts live in src/fonts (not public/) so they build to hashed
         /assets/ files. That keeps these preload URLs and the @font-face
         URLs in App.css resolving to the same absolute URL when assets are
         served through the CDN (nginx rewrites "/assets/ in HTML; the CDN
         only serves /assets/ and redirects other paths back to the app
         origin, which would break preload matching). -->
    <link
      rel="preload"
      href="/src/fonts/diatype/ABCDiatype-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/src/fonts/diatype/ABCDiatype-Light.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/src/fonts/diatype-mono/ABCDiatypeMono-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Speakeasy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
