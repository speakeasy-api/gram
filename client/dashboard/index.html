<!doctype html>
<html lang="en" class="dark:scheme-dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon adapts to the browser/OS color scheme, matching the
         Speakeasy marketing site. The PNGs are bare transparent logos, so
         the visible variant must track the tab-bar background — which
         follows prefers-color-scheme, not the in-app theme. -->
    <link
      rel="icon"
      type="image/png"
      href="/favicon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/favicon-dark.png"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="alternate icon" href="/favicon.ico" />

    <!-- Apply the theme class before first paint to avoid a flash of the
         wrong theme on load. Mirrors App.tsx (key: "preferred-theme",
         default: light). Keep these in sync. -->
    <script>
      (function () {
        try {
          var theme =
            localStorage.getItem("preferred-theme") === "dark"
              ? "dark"
              : "light";
          var root = document.documentElement;
          root.classList.remove("light", "dark");
          root.classList.add(theme);
        } catch (e) {
          /* localStorage unavailable — fall back to CSS defaults */
        }
      })();
    </script>

    <meta property="og:title" content="Speakeasy AI Control Plane" />
    <meta
      property="og:description"
      content="A control plane to connect, secure and scale AI usage across your organization."
    />
    <meta
      property="og:image"
      content="https://app.getgram.ai/og-image.png?v=1"
    />
    <meta property="og:url" content="https://app.getgram.ai" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Speakeasy" />
    <meta property="og:locale" content="en_US" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://widget.usepylon.com" crossorigin />
    <link
      rel="preconnect"
      href="https://browser-intake-datadoghq.com"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://static.clairedefermat.com"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/diatype/ABCDiatype-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/diatype/ABCDiatype-Light.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/diatype-mono/ABCDiatypeMono-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Speakeasy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
