# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json

version: "2"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  relative-path-mode: wd

linters:
  enable:
    - bodyclose
    - containedctx
    - depguard
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - forbidigo
    - forcetypeassert
    - gochecksumtype
    - gocritic
    - gosec
    - glint
    - govet
    - iface
    - importas
    - ineffassign
    - loggercheck
    - mirror
    - musttag
    - nolintlint
    - paralleltest
    - predeclared
    - reassign
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unused
    - usetesting
    - wrapcheck

  exclusions:
    rules:
      - path: internal/o11y/setup\.go
        linters:
          - wrapcheck
      - path: internal/billing/stub\.go
        linters:
          - musttag
      - path: cmd/|internal/dns/
        linters:
          - forbidigo
      # Bench commands and dev-mcp are developer CLIs (not part of the server
      # binary). Like test files, they favor terse partial structs and direct
      # error returns over production-grade hardening, so exempt them from the
      # same dev-tooling linters we exempt tests from.
      - path: cmd/(riskjudge|skillefficacy)bench/|cmd/dev-mcp/
        linters:
          - exhaustruct
          - wrapcheck
          - predeclared
          - sloglint
      # gosec stays on for the tool; exempt only G304 (the input cases file is a
      # CLI flag, so a variable path is inherent and not attacker-controlled).
      - path: cmd/(riskjudge|skillefficacy)bench/
        linters:
          - gosec
        text: G304
      - path: internal/dns/net_resolver\.go
        linters:
          - wrapcheck
      - path: _test\.go|internal/oauthtest
        linters:
          - exhaustruct
          - gosec
      # False positives that scope constants are somehow hardcoded credentials.
      - path: internal/access/scopes\.go
        linters:
          - gosec
        text: G101
      # False positives that audit action constants containing "bypass" are somehow hardcoded credentials.
      - path: internal/audit/risk\.go
        linters:
          - gosec
        text: G101
      # False positives that audit subject/action constants containing "credential" are somehow hardcoded credentials.
      - path: internal/audit/(events|awsiamcredentials|gcpiamcredentials)\.go
        linters:
          - gosec
        text: G101
      # The guardian package is the only package that is allowed to access
      # http.Client directly since it constructs the safe HTTP clients
      # that are used throughout the codebase. This is tracked by GG002.
      - path: internal/guardian/policy\.go
        linters:
          - forbidigo
        text: GG002
      # The gateway package contains an HTTP reverse proxy that needs finer
      # grained control over the HTTP client it uses, so we allow direct use of
      # http.Client there as well. It is manually decorating the client with
      # SSRF protection from the guardian module and OTel instrumentation.
      - path: internal/gateway/proxy\.go
        linters:
          - forbidigo
        text: GG002
      # This is the only sanctioned place to use slog attribute builders to establish conventions.
      - path: internal/attr/conventions\.go
        linters:
          - glint
        text: enforceo11yconventions
      # sloglint's constant key linter does not recognise the use of constants with type `attribute.Key` from `go.opentelemetry.io/otel/attribute`.
      - path: internal/attr/conventions\.go
        linters:
          - sloglint
        text: key should be a constant
      # This is forwarding log events from within pgx library that we have no control over.
      - path: internal/o11y/slog\.go
        linters:
          - glint
        text: enforceo11yconventions
      # slog.go is the sanctioned logger: it constructs slog.NewJSONHandler(os.Stderr, ...)
      # by design, which is the one place os.Stderr is allowed.
      - path: internal/o11y/slog\.go
        linters:
          - forbidigo
        text: GG012
      # Not interesting to enforce this in tests
      - path: _test\.go|internal/testenv/
        linters:
          - glint
        text: enforceo11yconventions
      # Not interesting to enforce this in tests. Tests and testenv legitimately
      # use the stdlib log package (setup_test.go) and occasionally os.Std* for
      # diagnostics, so they are also exempt from GG011/GG012.
      - path: _test\.go|internal/testenv/|internal/testinfra/
        linters:
          - forbidigo
        text: GG001|GG002|GG011|GG012
      # GG006/GG009 redirect tests to the testenv helpers; production code may
      # legitimately construct discard loggers and noop meter providers, so
      # they are only enforced in test files.
      - path-except: _test\.go
        linters:
          - forbidigo
        text: GG006|GG009
      # The testenv package is the canonical provider of the helpers that
      # GG006/GG008/GG009 redirect tests to. It necessarily constructs the
      # underlying primitives directly.
      - path: internal/testenv/testing\.go
        linters:
          - forbidigo
        text: GG006|GG008|GG009
      # Production observability setup falls back to noop providers when
      # no exporter is configured.
      - path: internal/o11y/setup\.go
        linters:
          - forbidigo
        text: GG008|GG009
      # logger.go is the one sanctioned place that calls InsertAuditLog directly;
      # all other callers must go through (*audit.Logger).log().
      - path: internal/audit/logger\.go|_test\.go
        linters:
          - forbidigo
        text: GG010
      # GG013 (no time.Sleep) is enforced repo-wide EXCEPT the files below, which
      # still hold legitimate or not-yet-reviewed time.Sleep calls.
      - path: internal/background/activities/custom_domain_ingress\.go|internal/guardian/policy_test\.go|internal/hooks/pending_helpers_test\.go|internal/remotemcp/proxy/proxy_test\.go|internal/testenv/redis\.go|internal/testinfra/clickhouse\.go|internal/variations/listglobal_test\.go
        linters:
          - forbidigo
        text: GG013
  settings:
    custom:
      glint:
        type: module
        description: Gram-specific lint rules.
        original-url: github.com/speakeasy-api/gram/glint
        settings:
          rules:
            enforce-o11y-conventions:
              disabled: false
              message: Use the attribute builders in `github.com/speakeasy-api/gram/server/internal/attr` instead.
            no-anonymous-defer:
              disabled: true
            no-repo-fields-in-service:
              disabled: true
            audit-event-typed-snapshot:
              disabled: false
            audit-event-urn-naming:
              disabled: false
            audit-event-urn-typing:
              disabled: false
            audit-action-naming:
              disabled: true
            no-client-error-log-error:
              disabled: false
              # Opt in one oops.Code at a time as its 4xx `.LogError` call sites
              # are migrated to `.LogWarn` / `.LogInfo`. An empty list reports
              # nothing, so the rule stays silent until a code is enabled here.
              codes: []
            rpc-endpoint-format:
              disabled: false
    gosec:
      excludes:
        # Temporarily ignore this lint rule because it needs to be a separate
        # refactor to address properly.
        - G117
        # Taint analysis engine introduced in gosec v2.23.0 throws up a lot of
        # false positives that peppering the codebase with `#nosec` comments
        # starts the defeat the value of the linter. We'll parking these lints
        # for now and review in newer versions of gosec.
        - G703
        - G704
        - G705
    forbidigo:
      analyze-types: true
      forbid:
        - pattern: ^os\.Getenv$
          pkg: ^os$
          msg: "GG001: Direct environment variable access is forbidden because it makes testing harder. Access to environment variables is only allowed in the cmd/."
        - pattern: ^http\.Client$
          pkg: ^net/http$
          msg: "GG002: Use `(*github.com/speakeasy-api/gram/server/internal/guardian.Policy).Client(...)` (or .PooledClient(...)) and the HTTPClient from the same package."
        - pattern: ^otel\.Tracer$
          pkg: ^go\.opentelemetry\.io/otel$
          msg: "GG003: pass a trace.TracerProvider to functions instead of using otel.Tracer directly."
        - pattern: ^testing\.T\.(Skip|SkipNow|Skipf)$
          pkg: ^testing$
          msg: "GG004: avoid committing skipped tests."
        - pattern: ^net\.Lookup(Addr|CNAME|Host|IP|MX|NS|Port|SRV|TXT)$
          pkg: ^net$
          msg: "GG005: Use dns.NewNetResolver() instead of net.Lookup* for testability."
        - pattern: ^slog\.DiscardHandler$
          pkg: ^log/slog$
          msg: "GG006: Use testenv.NewLogger(t) in tests instead of slog.DiscardHandler. testenv.NewLogger discards by default and emits pretty logs under `go test -v`."
        - pattern: ^slog\.Default$
          pkg: ^log/slog$
          msg: "GG007: Pass a logger explicitly. In tests use testenv.NewLogger(t)."
        - pattern: ^noop\.NewTracerProvider$
          pkg: ^go\.opentelemetry\.io/otel/trace/noop$
          msg: "GG008: Use testenv.NewTracerProvider(t) in tests instead of constructing a noop tracer provider inline."
        - pattern: ^noop\.NewMeterProvider$
          pkg: ^go\.opentelemetry\.io/otel/metric/noop$
          msg: "GG009: Use testenv.NewMeterProvider(t) in tests instead of constructing a noop meter provider inline."
        - pattern: '\.InsertAuditLog\('
          msg: "GG010: Call (*audit.Logger).log() instead of (*repo.Queries).InsertAuditLog directly."
        - pattern: ^(print|println)$
          msg: "GG011: The print/println builtins write to stderr and bypass structured logging (they surface as untagged status:error logs in production). Use a *slog.Logger instead."
        - pattern: ^fmt\.Print(f|ln)?$
          pkg: ^fmt$
          msg: "GG011: fmt.Print/Printf/Println write to stdout and bypass structured logging. Use a *slog.Logger instead."
        - pattern: ^log\.(Print(f|ln)?|Fatal(f|ln)?|Panic(f|ln)?|New|Default|SetOutput|SetFlags|SetPrefix)$
          pkg: ^log$
          msg: "GG011: The standard library log package bypasses structured logging. Use a *slog.Logger (log/slog) instead."
        - pattern: ^debug\.PrintStack$
          pkg: ^runtime/debug$
          msg: "GG011: debug.PrintStack writes to stderr. Capture debug.Stack() and log it via a *slog.Logger instead."
        - pattern: ^os\.Stdout$
          pkg: ^os$
          msg: "GG012: Writing to os.Stdout bypasses structured logging. Use a *slog.Logger instead."
        - pattern: ^os\.Stderr$
          pkg: ^os$
          msg: "GG012: Writing to os.Stderr bypasses structured logging. Use a *slog.Logger instead. The sanctioned slog handler setup in internal/o11y/slog.go is exempt."
        - pattern: ^time\.Sleep$
          pkg: ^time$
          msg: "GG013: Avoid time.Sleep. In tests, poll with require.EventuallyWithT (wait until assertions pass) or require.Never (assert a condition never holds)."
        - pattern: ^clickhouse\.With(Std)?Async$
          pkg: ^github\.com/ClickHouse/clickhouse-go/v2$
          msg: "GG014: clickhouse.WithAsync does not enable or disable async insert. It always sets async_insert=1 and its bool only picks wait_for_async_insert, so WithAsync(false) is fire-and-forget. State the posture explicitly with WithSettings instead: async_insert 0 for a synchronous insert, or async_insert 1 plus wait_for_async_insert 0 for fire-and-forget."
    sloglint:
      no-mixed-args: true
      attr-only: true
      no-global: all
      context: all
      no-raw-keys: true
      forbidden-keys:
        - err
        - org
        - project
    staticcheck:
      dot-import-whitelist:
        - goa.design/goa/v3/dsl
      checks:
        - "all"
        - "-ST1000"
        - "-ST1003"
        - "-ST1016"
        - "-SA1019"
        - "-ST1020"
        - "-ST1021"
        - "-ST1022"
    spancheck:
      checks:
        - end
        - set-status
      ignore-check-signatures:
        - '\(\*github\.com/speakeasy-api/gram/server/internal/oops\.ShareableError\)\.LogError\('
    gocritic:
      disabled-checks:
        - ifElseChain
    exhaustruct:
      exclude:
        - '^crypto/tls\.Config$'
        - '^net\.Dialer$'
        - '^net/url\.URL$'
        - '^net/http\.Server$'
        - '^net/http\.Client$'
        - '^net/http\.Transport$'
        - '^github.com/charmbracelet/log\.Options$'
        - '^github.com/urfave/cli/v2\.App$'
        - '^github.com/urfave/cli/v2\.Command$'
        - '^github.com/urfave/cli/v2\..*Flag$'
        - '^gopkg.in/yaml.v3\.Node$'
        - '^github.com/redis/go-redis/v9\.Options$'
        - '^github.com/testcontainers/testcontainers-go\.GenericContainerRequest$'
        - '^github.com/testcontainers/testcontainers-go\.ContainerRequest$'
        - '^github.com/go-redis/cache/v9\.Options$'
        - '^github.com/go-redis/cache/v9\.Item$'
        - '^github.com/gomarkdown/markdown/html\.RendererOptions$'
        - '^go.temporal.io/sdk/internal\.RetryPolicy$'
        - '^go.temporal.io/sdk/internal\..+Options$'
        - '^go.temporal.io/sdk/internal\.ScheduleSpec$'
        - '^go.temporal.io/sdk/internal\.ScheduleIntervalSpec$'
        - '^go.temporal.io/sdk/internal\.ScheduleWorkflowAction$'
        - '^go.temporal.io/sdk/contrib/opentelemetry\..+Options$'
        - '^go.temporal.io/sdk/testsuite\.DevServerOptions$'
        - '^k8s.io/apimachinery/pkg/apis/meta/v1\..+$'
        - '^k8s.io/api/networking/v1\..+$'
        - '^sigs.k8s.io/gateway-api/apis/v1\..+$'
        - '^k8s.io/client-go/rest\.Config$'
        - '^k8s.io/client-go/rest\.TLSClientConfig$'
        - '^github.com/posthog/posthog-go\..+$'
        - '^github\.com/speakeasy-api/openapi/.*'
        - '^github\.com/polarsource/polar-go/.*'
        - '^github\.com/docker/docker/api/types/.*'
        - '^github\.com/superfly/fly-go.*'
        - '^github\.com/speakeasy-api/gram/server/gen/types\.Tool$'
        - '^github\.com/ClickHouse/clickhouse-go/v2\.Options$'
        - '^github\.com/aws/aws-sdk-go-v2/service/s3\..+Input$'
        - '^github\.com/aws/aws-sdk-go-v2/service/s3\..+Options$'
        - '^cloud\.google\.com/go/storage\.SignedURLOptions$'
        - '^github.com/google/jsonschema-go/jsonschema\.Schema$'
        # Declarative classifier table: each entry intentionally sets only the
        # one classification field (Source, RuleIDs, or RulePrefix) plus the
        # always-present metadata. Filter is the runtime output struct, same
        # pattern.
        - '^github\.com/speakeasy-api/gram/server/internal/risk/categories\.Definition$'
        - '^github\.com/speakeasy-api/gram/server/internal/risk/categories\.Filter$'
        - '^github\.com/speakeasy-api/gram/infra/gen/gram/.+'
    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: true
    errcheck:
      exclude-functions:
        - "github.com/speakeasy-api/gram/server/internal/o11y.LogDefer"
        - "github.com/speakeasy-api/gram/server/internal/o11y.NoLogDefer"
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "math/rand$"
              desc: use math/rand/v2
            - pkg: "go.uber.org/zap"
              desc: Use log/slog
            - pkg: "github.com/jackc/pgx/v4"
              desc: Use github.com/jackc/pgx/v5
            - pkg: "gopkg.in/yaml.v2"
              desc: Use gopkg.in/yaml.v3
            - pkg: "github.com/urfave/cli/v3"
              desc: V3 is not ready yet use github.com/urfave/cli/v2
            - pkg: "github.com/pkg/errors"
              desc: Should be replaced by standard lib errors package
            # GG011: debug value dumpers write to stdout/stderr and bypass
            # structured logging. Forbidden at the import level (forbidigo only
            # matches call sites). Use a *slog.Logger instead.
            - pkg: "github.com/davecgh/go-spew/spew"
              desc: "GG011: spew bypasses structured logging; use a *slog.Logger."
            - pkg: "github.com/sanity-io/litter"
              desc: "GG011: litter bypasses structured logging; use a *slog.Logger."
            - pkg: "github.com/k0kubun/pp"
              desc: "GG011: pp bypasses structured logging; use a *slog.Logger."
        # testenv exposes cross-cutting test primitives (loggers, OTel
        # providers, encryption clients, infra launchers). It must not import
        # domain packages, otherwise internal tests in those packages can no
        # longer use testenv. Per-domain test helpers belong in sibling
        # packages such as `externalmcptest` and `functionstest`.
        testenv-no-domain-imports:
          list-mode: lax
          files:
            - "**/internal/testenv/*.go"
          deny:
            - pkg: "github.com/speakeasy-api/gram/server/internal/externalmcp"
              desc: Move helpers that need externalmcp to internal/externalmcptest.
            - pkg: "github.com/speakeasy-api/gram/server/internal/functions"
              desc: Move helpers that need functions to internal/functionstest.
            - pkg: "github.com/speakeasy-api/gram/server/internal/assets"
              desc: Move helpers that need assets to a per-domain test package.
            - pkg: "github.com/speakeasy-api/gram/server/internal/authz"
              desc: testenv must not depend on authz; tests in package authz import testenv.
    importas:
      no-unaliased: true
      alias:
        - pkg: goa.design/goa/v3/http
          alias: goahttp
    nolintlint:
      require-specific: true
      require-explanation: true
    wrapcheck:
      ignore-sigs:
        - "errors.New("
        - "errors.Join("
        - "fmt.Errorf("

        - "(*github.com/sourcegraph/conc/pool.ErrorPool).Wait("
        - "(*golang.org/x/sync/singleflight.Group).Do("
        - "go.temporal.io/sdk/temporal.NewApplicationErrorWithOptions("
        - "go.temporal.io/sdk/temporal.NewApplicationErrorWithCause("
        - "go.temporal.io/sdk/temporal.NewNonRetryableApplicationError("
        - "go.temporal.io/sdk/workflow.NewContinueAsNewError("
        - "go.temporal.io/sdk/workflow.Sleep("
        - "(go.temporal.io/sdk/client.Client).ExecuteWorkflow("
        - "(go.temporal.io/sdk/internal.WorkflowInboundInterceptor).ExecuteWorkflow("
        - "(go.temporal.io/sdk/internal.ActivityInboundInterceptor).ExecuteActivity("
        - "(go.temporal.io/sdk/internal.Future).Get("
        - "(github.com/stretchr/testify/mock.Arguments).Error("

        - "github.com/speakeasy-api/gram/server/internal/oops.C("
        - "github.com/speakeasy-api/gram/server/internal/oops.E("
        - "github.com/speakeasy-api/gram/server/internal/oops.Permanent("
        - "github.com/speakeasy-api/gram/server/internal/httpcache.WriteCacheableJSON("
        - "github.com/speakeasy-api/gram/server/internal/platformtools/core.DecodeInput("
        - "github.com/speakeasy-api/gram/server/internal/platformtools/core.EncodeResult("
        - "(*github.com/speakeasy-api/gram/server/internal/access.Manager).Require("
        - "(*github.com/speakeasy-api/gram/server/internal/access.Manager).RequireAny("
        - "(*github.com/speakeasy-api/gram/server/internal/access.Manager).Filter("
        - "(*github.com/speakeasy-api/gram/server/internal/access.Manager).PrepareContext("
        - "(*github.com/speakeasy-api/gram/server/internal/authz.Engine).Require("
        - "(*github.com/speakeasy-api/gram/server/internal/authz.Engine).RequireAny("
        - "(*github.com/speakeasy-api/gram/server/internal/authz.Engine).Filter("
        - "(*github.com/speakeasy-api/gram/server/internal/authz.Engine).ShouldEnforce("
        - "github.com/speakeasy-api/gram/server/internal/authz.GrantsForRole("
        - "(*github.com/speakeasy-api/gram/server/internal/auth.Auth).Authorize("
        - "(*github.com/speakeasy-api/gram/server/internal/auth/chatsessions.Manager).Authorize("
        - "(*github.com/speakeasy-api/gram/server/internal/auth.Auth).CheckProjectAccess("
        - "(*github.com/speakeasy-api/gram/server/internal/auth/sessions.Manager).Authenticate("
        - "(*github.com/speakeasy-api/gram/server/internal/openapi.ToolExtractor).Do("
        - "(*github.com/speakeasy-api/gram/server/internal/functions.ToolExtractor).Do("
        - "github.com/speakeasy-api/gram/server/internal/mv.ToolVariationsGroupName("
        - "(*github.com/speakeasy-api/gram/server/internal/thirdparty/slack/api.Client).Call("
        - "(*github.com/speakeasy-api/gram/server/internal/thirdparty/slack/api.Client).CallWithToken("

      ignore-sig-regexps:
        - "\\(\\*github\\.com\\/speakeasy-api\\/gram\\/server\\/internal\\/background\\/activities\\..+\\)\\.Do\\("
        - "github\\.com\\/speakeasy-api\\/gram\\/server\\/internal\\/mv\\.Describe.+\\("
