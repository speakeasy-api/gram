version: "2"
overrides:
  go:
    overrides:
      - db_type: "uuid"
        go_type:
          import: "github.com/google/uuid"
          type: "UUID"
        nullable: false
      - db_type: "uuid"
        go_type:
          import: "github.com/google/uuid"
          type: "NullUUID"
        nullable: true

sql:
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    gen:
      go:
        package: "repo"
        out: "repo"
        sql_package: "pgx/v5"
        omit_unused_structs: true
