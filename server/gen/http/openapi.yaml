    TemplatesCreateTemplateRequestBody:
        title: TemplatesCreateTemplateRequestBody
        type: object
        properties:
            arguments:
                type: string
                description: The JSON Schema defining the placeholders found in the prompt template
                example: '{"name":"example","email":"mail@example.com"}'
                format: json
            description:
                type: string
                description: The description of the prompt template
                example: Officia ab quis aliquam dolorum.
            engine:
                type: string
                description: The template engine
                example: mustache
                enum:
                    - mustache
            kind:
                type: string
                description: The kind of prompt the template is used for
                example: prompt
                enum:
                    - prompt
                    - higher_order_tool
            name:
                type: string
                description: The name of the prompt template
                example: yo7
                pattern: ^[a-z0-9_-]{1,128}$
                maxLength: 40
            prompt:
                type: string
                description: The template content
                example: Iste consectetur fugit sequi ratione id commodi.
            tool_urns_hint:
                type: array
                items:
                    type: string
                    example: Et sint omnis dolor quas eum.
                description: The suggested tool URNS associated with the prompt template
                example:
                    - Aut animi ut.
                    - Laudantium laboriosam dignissimos aut maiores magni quia.
                    - Et accusantium corrupti quia non.
                maxItems: 20
            tools_hint:
                type: array
                items:
                    type: string
                    example: Qui sunt et sit consequatur perspiciatis eligendi.
                description: The suggested tool names associated with the prompt template
                example:
                    - Voluptas eveniet architecto earum consequatur.
                    - Eius odio nemo placeat sed ad consequuntur.
                    - Accusamus qui qui.
                maxItems: 20
        example:
            arguments: '{"name":"example","email":"mail@example.com"}'
            description: Id ea quia.
            engine: mustache
            kind: prompt
            name: 9sn
            prompt: Nisi est.
            tool_urns_hint:
                - Dolorum est est quaerat.
                - Unde nihil repudiandae.
                - Doloribus officia hic.
            tools_hint:
                - Sequi error.
                - Qui sequi maxime temporibus beatae.
                - Officiis atque.
        required:
            - name
            - prompt
            - engine
            - kind
