    VariationsUpsertGlobalRequestBody:
        title: VariationsUpsertGlobalRequestBody
        type: object
        properties:
            confirm:
                type: string
                description: The confirmation mode for the tool variation
                example: never
                enum:
                    - always
                    - never
                    - session
            confirm_prompt:
                type: string
                description: The confirmation prompt for the tool variation
                example: Ut rem.
            description:
                type: string
                description: The description of the tool variation
                example: Modi quis.
            name:
                type: string
                description: The name of the tool variation
                example: Voluptas temporibus vel voluptas consequatur atque.
            src_tool_name:
                type: string
                description: The name of the source tool
                example: Quas aut dolorem id quo nihil quia.
            src_tool_urn:
                type: string
                description: The URN of the source tool
                example: Rerum in quasi esse in ut.
            summarizer:
                type: string
                description: The summarizer of the tool variation
                example: Amet culpa esse ipsa enim.
            summary:
                type: string
                description: The summary of the tool variation
                example: Ut soluta numquam expedita.
            tags:
                type: array
                items:
                    type: string
                    example: Corrupti aliquid saepe.
                description: The tags of the tool variation
                example:
                    - Adipisci dignissimos rerum deleniti vel ad vel.
                    - Est inventore qui eaque qui et dolor.
                    - At quibusdam molestiae accusantium et explicabo perferendis.
        example:
            confirm: always
            confirm_prompt: Et alias facilis assumenda voluptates dolorem voluptatibus.
            description: Necessitatibus rerum nulla voluptas.
            name: Cumque laboriosam aut qui dolores.
            src_tool_name: Exercitationem quo unde veritatis.
            src_tool_urn: Sit delectus.
            summarizer: In nihil nisi ullam sit.
            summary: Illo ut quas totam quod.
            tags:
                - Dolore cum deserunt.
                - Atque autem recusandae ipsam aut possimus quisquam.
        required:
            - src_tool_name
            - src_tool_urn
