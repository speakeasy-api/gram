    ToolsetsCreateToolsetRequestBody:
        title: ToolsetsCreateToolsetRequestBody
        type: object
        properties:
            default_environment_slug:
                type: string
                description: The slug of the environment to use as the default for the toolset
                example: pc9
                pattern: ^[a-z0-9_-]{1,128}$
                maxLength: 40
            description:
                type: string
                description: Description of the toolset
                example: Omnis aut tempora.
            name:
                type: string
                description: The name of the toolset
                example: Voluptatem molestias repudiandae ea.
            resource_urns:
                type: array
                items:
                    type: string
                    example: Incidunt incidunt fuga.
                description: List of resource URNs to include in the toolset
                example:
                    - Repellat quasi necessitatibus laborum dicta qui incidunt.
                    - Aut iure facere mollitia quidem nihil aut.
            tool_urns:
                type: array
                items:
                    type: string
                    example: Doloribus illo ab sit consequatur voluptates et.
                description: List of tool URNs to include in the toolset
                example:
                    - Maxime sit cupiditate fugiat aliquam rerum.
                    - Et ut.
        example:
            default_environment_slug: 1t3
            description: Non aliquam.
            name: Omnis sequi facere.
            resource_urns:
                - Qui alias enim omnis omnis veritatis enim.
                - Corporis debitis et quo qui doloremque tenetur.
            tool_urns:
