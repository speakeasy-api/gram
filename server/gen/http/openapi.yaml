definitions:
    AddDeploymentPackageForm:
        title: AddDeploymentPackageForm
        type: object
        properties:
            name:
                type: string
                description: The name of the package.
                example: Possimus eaque dolorem quo itaque rerum quo.
            version:
                type: string
                description: The version of the package.
                example: Autem libero nemo rerum.
        example:
            name: Suscipit sit aut voluptates commodi.
            version: Recusandae optio.
        required:
            - name
    AddExternalMCPForm:
        title: AddExternalMCPForm
        type: object
        properties:
            name:
                type: string
                description: The reverse-DNS name of the external MCP server (e.g., 'ai.exa/exa').
                example: ai.exa/exa
            registry_id:
                type: string
                description: The ID of the MCP registry the server is from.
                example: a4c4ec86-d26a-4eed-ad65-27a528a5d242
                format: uuid
            slug:
                type: string
                description: A URL-friendly identifier used for tool prefixing (e.g., 'exa').
                example: qwh
                pattern: ^[a-z0-9_-]{1,128}$
                maxLength: 40
        example:
            name: ai.exa/exa
            registry_id: d7e05d89-8628-4858-9fae-e23e8d4cc2e7
            slug: ddf
        required:
            - registry_id
            - name
            - slug
    AddFunctionsForm:
        title: AddFunctionsForm
        type: object
        properties:
            asset_id:
                type: string
                description: The ID of the functions file from the assets service.
                example: Totam repellat.
            name:
                type: string
                description: The functions file display name.
                example: Asperiores cum et.
            runtime:
                type: string
                description: 'The runtime to use when executing functions. Allowed values are: nodejs:22, python:3.12.'
                example: Nulla ullam ex modi ea accusamus.
            slug:
                type: string
                description: A URL-friendly string that identifies the functions file. Usually derived from the name.
                example: 8o9
                pattern: ^[a-z0-9_-]{1,128}$
                maxLength: 40
        example:
            asset_id: Voluptatibus amet voluptatum.
            name: Perferendis aut reprehenderit aut et.
            runtime: Velit velit et accusamus vero saepe.
            slug: sls
        required:
            - asset_id
            - name
            - slug
            - runtime
    AddOpenAPIv3DeploymentAssetForm:
        title: AddOpenAPIv3DeploymentAssetForm
        type: object
        properties:
            asset_id:
                type: string
                description: The ID of the uploaded asset.
                example: Laborum earum quo ut id.
            name:
                type: string
                description: The name to give the document as it will be displayed in UIs.
                example: Vero quibusdam est nemo suscipit voluptates nobis.
            slug:
                type: string
                description: The slug to give the document as it will be displayed in URLs.
                example: tbr
                pattern: ^[a-z0-9_-]{1,128}$
                maxLength: 40
        example:
            asset_id: Et natus dolores totam est saepe voluptas.
            name: Distinctio ducimus ratione numquam ducimus et.
            slug: dip
        required:
            - asset_id
            - name
            - slug
    AddPackageForm:
        title: AddPackageForm
        type: object
        properties:
            name:
                type: string
                description: The name of the package to add.
                example: Nobis qui ipsam.
            version:
                type: string
                description: The version of the package to add. If omitted, the latest version will be used.
                example: Et amet autem molestiae.
        example:
            name: Velit dolores eaque ullam.
            version: Ratione aut qui voluptatem occaecati recusandae qui.
        required:
            - name
    AgentResponseOutput:
        title: AgentResponseOutput
        type: object
        properties:
            created_at:
                type: integer
                description: Unix timestamp when the response was created
                example: 8941085288847151773
                format: int64
            error:
                type: string
                description: Error message if the response failed
                example: Unde soluta omnis nihil beatae.
            id:
                type: string
                description: Unique identifier for this response
                example: Veniam voluptas at rerum aut.
            instructions:
                type: string
                description: The instructions that were used
                example: Aut quia qui rerum est debitis.
            model:
                type: string
                description: The model that was used
                example: Quasi quasi aut.
            object:
                type: string
                description: Object type, always 'response'
                example: In et aliquid.
            output:
                type: array
                items:
                    example: Nam commodi fugit pariatur.
                description: Array of output items (messages, tool calls)
                example:
                    - Quia adipisci sapiente modi.
                    - Laudantium temporibus velit libero quibusdam illum eveniet.
                    - Molestias consequuntur nobis dolorem expedita.
                    - Id neque quasi ut natus.
            previous_response_id:
                type: string
                description: ID of the previous response if continuing
                example: Incidunt alias voluptates.
            result:
                type: string
                description: The final text result from the agent
                example: Similique officia.
            status:
                type: string
                description: Status of the response
                example: in_progress
                enum:
                    - in_progress
                    - completed
                    - failed
            temperature:
                type: number
                description: Temperature that was used
                example: 0.532344529436946
                format: double
            text:
                $ref: '#/definitions/AgentResponseText'
        description: The agent response output
        example:
            created_at: 138009121218064938
            error: Architecto quam illum.
            id: Numquam rem sit reiciendis.
            instructions: Voluptatem provident ipsam.
            model: Voluptas rem ut perspiciatis eum ratione minus.
            object: Saepe ipsum.
            output:
                - Labore voluptates sit.
                - Rem accusamus iste.
            previous_response_id: Sit velit ab et.
            result: Aut dolores.
            status: in_progress
            temperature: 0.2437362910321061
            text:
                format:
                    type: Sequi veniam officia.
        required:
            - id
            - object
            - created_at
            - status
            - model
            - output
            - temperature
            - text
            - result
    AgentResponseText:
        title: AgentResponseText
        type: object
        properties:
            format:
                $ref: '#/definitions/AgentTextFormat'
        description: Text format configuration for the response
        example:
            format:
                type: Sequi veniam officia.
        required:
            - format
    AgentSubAgent:
        title: AgentSubAgent
        type: object
        properties:
            description:
                type: string
                description: Description of what this sub-agent does
                example: Nulla quae.
            environment_slug:
                type: string
                description: The environment slug for auth
                example: Officiis qui quia.
            instructions:
                type: string
                description: Instructions for this sub-agent
                example: Est alias quia quis inventore.
            name:
                type: string
                description: The name of this sub-agent
                example: Nihil placeat sit ea.
            tools:
                type: array
                items:
                    type: string
                    example: Similique accusamus aut molestiae velit explicabo.
                description: Tool URNs available to this sub-agent
                example:
                    - Explicabo occaecati quas.
                    - Vel quis illo et laboriosam quas laudantium.
            toolsets:
                type: array
                items:
                    $ref: '#/definitions/AgentToolset'
                description: Toolsets available to this sub-agent
                example:
                    - environment_slug: Repellat expedita saepe nulla.
                      toolset_slug: Voluptatem mollitia tempore.
                    - environment_slug: Repellat expedita saepe nulla.
                      toolset_slug: Voluptatem mollitia tempore.
                    - environment_slug: Repellat expedita saepe nulla.
                      toolset_slug: Voluptatem mollitia tempore.
                    - environment_slug: Repellat expedita saepe nulla.
                      toolset_slug: Voluptatem mollitia tempore.
        description: A sub-agent definition for the agent workflow
        example:
            description: Beatae impedit molestias sequi.
            environment_slug: Cum quibusdam voluptas non aut voluptatem.
            instructions: Officia inventore exercitationem non excepturi nesciunt.
            name: Sit eos velit quia.
            tools:
                - Omnis voluptatem veniam molestiae earum voluptas.
                - Quis cumque sit magni autem.
                - Enim est fuga velit impedit eos.
                - Natus architecto sit.
            toolsets:
                - environment_slug: Repellat expedita saepe nulla.
                  toolset_slug: Voluptatem mollitia tempore.
                - environment_slug: Repellat expedita saepe nulla.
                  toolset_slug: Voluptatem mollitia tempore.
        required:
            - name
            - description
    AgentTextFormat:
        title: AgentTextFormat
        type: object
        properties:
            type:
                type: string
                description: The type of text format (e.g., 'text')
                example: Optio et nisi.
        description: Text format type
        example:
            type: Et praesentium aspernatur sed itaque.
        required:
            - type
    AgentToolset:
        title: AgentToolset
        type: object
        properties:
            environment_slug:
                type: string
                description: The slug of the environment for auth
                example: Facere sequi culpa voluptatem blanditiis ea sunt.
            toolset_slug:
                type: string
                description: The slug of the toolset to use
                example: Esse corporis vitae maiores.
        description: A toolset reference for agent execution
        example:
            environment_slug: Aspernatur quibusdam nostrum voluptatem culpa dolores earum.
            toolset_slug: Ad est accusamus cupiditate aut et.
        required:
            - toolset_slug
            - environment_slug
    AgentsCreateResponseBadRequestResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
