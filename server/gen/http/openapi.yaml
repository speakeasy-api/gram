    Key:
        title: Key
        type: object
        properties:
            created_at:
                type: string
                description: The creation date of the key.
                example: "1989-05-23T16:35:16Z"
                format: date-time
            created_by_user_id:
                type: string
                description: The ID of the user who created this key
                example: Repellat quod quisquam laborum nulla excepturi.
            id:
                type: string
                description: The ID of the key
                example: Expedita exercitationem veniam fuga excepturi.
            key:
                type: string
                description: The token of the api key (only returned on key creation)
                example: Natus laudantium.
            key_prefix:
                type: string
                description: The store prefix of the api key for recognition
                example: Facilis at nihil deleniti expedita tenetur excepturi.
            name:
                type: string
                description: The name of the key
                example: Ea nemo.
            organization_id:
                type: string
                description: The organization ID this key belongs to
                example: Harum et ut molestiae perferendis.
            project_id:
                type: string
                description: The optional project ID this key is scoped to
                example: Enim nihil sit delectus asperiores enim.
            scopes:
                type: array
                items:
                    type: string
                    example: Aut enim dolorem repellendus atque aliquid dolorum.
                description: List of permission scopes for this key
                example:
                    - Natus laboriosam ad rem sed adipisci.
                    - Ex occaecati nesciunt recusandae necessitatibus.
                    - Ipsum odit at.
            updated_at:
                type: string
                description: When the key was last updated.
                example: "2001-10-31T17:03:55Z"
                format: date-time
        example:
            created_at: "1992-07-19T22:12:42Z"
            created_by_user_id: Expedita magnam.
            id: Explicabo tenetur qui possimus et.
            key: Aliquid cum fugiat soluta in rerum.
            key_prefix: Possimus dolorum.
            name: Optio eos voluptates quaerat.
            organization_id: Soluta consequuntur facilis.
            project_id: Amet dolorem quia est.
            scopes:
                - Nihil quasi voluptatem corrupti voluptas.
                - Mollitia quas.
            updated_at: "2015-09-10T09:25:02Z"
        required:
            - id
            - organization_id
            - created_by_user_id
            - name
            - key_prefix
            - scopes
            - created_at
            - updated_at
