swagger: "2.0"
info:
    title: Gram API Description
    description: Gram is the tools platform for AI agents
    version: 0.0.1
host: localhost:80
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /rpc/{project_slug}/slack.login:
        get:
            description: Proxies to auth login through speakeasy oidc.
            operationId: slack#login
            parameters:
                - in: path
                  name: project_slug
                  required: true
                  type: string
                - description: The dashboard location to return too
                  in: query
                  name: return_url
                  required: false
                  type: string
                - description: Session header
                  in: header
                  name: Gram-Session
                  required: false
                  type: string
            responses:
                "307":
                    description: Temporary Redirect response.
                    headers:
                        Location:
                            description: The URL to redirect to after authentication
                            type: string
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/SlackLoginBadRequestResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        $ref: '#/definitions/SlackLoginUnauthorizedResponseBody'
                "403":
                    description: Forbidden response.
                    schema:
                        $ref: '#/definitions/SlackLoginForbiddenResponseBody'
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/SlackLoginNotFoundResponseBody'
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/SlackLoginConflictResponseBody'
                "415":
                    description: Unsupported Media Type response.
                    schema:
                        $ref: '#/definitions/SlackLoginUnsupportedMediaResponseBody'
                "422":
                    description: Unprocessable Entity response.
                    schema:
                        $ref: '#/definitions/SlackLoginInvalidResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/SlackLoginUnexpectedResponseBody'
                "502":
                    description: Bad Gateway response.
                    schema:
                        $ref: '#/definitions/SlackLoginGatewayErrorResponseBody'
            schemes:
                - http
            security:
                - project_slug_query_project_slug: []
                  session_header_Gram-Session: []
            summary: login slack
            tags:
                - slack
            x-speakeasy-name-override: slackLogin
            x-speakeasy-react-hook:
                disabled: true
    /rpc/agents.response:
