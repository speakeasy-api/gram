securityDefinitions:
    apikey_header_Authorization:
        type: apiKey
        description: |-
            key based auth.

            **Security Scopes**:
              * `consumer`: consumer based tool access
              * `producer`: producer based tool access
              * `chat`: chat based model usage access
        name: Authorization
        in: header
    apikey_header_Gram-Key:
        type: apiKey
        description: |-
            key based auth.

            **Security Scopes**:
              * `consumer`: consumer based tool access
              * `producer`: producer based tool access
              * `chat`: chat based model usage access
        name: Gram-Key
        in: header
    function_token_header_Authorization:
        type: apiKey
        description: Gram Functions token based auth.
        name: Authorization
        in: header
    project_slug_header_Gram-Project:
        type: apiKey
        description: project slug header auth.
        name: Gram-Project
        in: header
    project_slug_query_project_slug:
        type: apiKey
        description: project slug header auth.
        name: project_slug
        in: query
    session_header_Gram-Session:
        type: apiKey
        description: Session based auth. By cookie or header.
        name: Gram-Session
        in: header
