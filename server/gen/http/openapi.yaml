                format: uri
            id:
                type: string
                description: The ID of the metadata record
                example: Similique excepturi reiciendis sint et.
            instructions:
                type: string
                description: Server instructions returned in the MCP initialize response
                example: Totam minus et.
            logo_asset_id:
                type: string
                description: The asset ID for the MCP install page logo
                example: 88c505f8-b63c-424e-8f5d-a2bb32db2956
                format: uuid
            toolset_id:
                type: string
                description: The toolset associated with this install page metadata
                example: b818c685-97ce-43fa-b154-337833a98deb
                format: uuid
