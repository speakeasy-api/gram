                    format: int64
                    minimum: 0
                    maximum: 4096
                name:
                    type: string
                    description: The functions file display name.
                runtime:
                    type: string
                    description: 'The runtime to use when executing functions. Allowed values are: nodejs:22, nodejs:24, python:3.12.'
                scale:
                    type: integer
                    description: The number of instances to scale the function to.
                    format: int64
                    minimum: 0
                    maximum: 5
                slug:
                    type: string
                    description: A short url-friendly label that uniquely identifies a resource.
                    pattern: ^[a-z0-9_-]{1,128}$
                    maxLength: 40
            required:
                - asset_id
                - name
                - slug
                - runtime
        AddOAuthProxyServerForm:
            type: object
            properties:
                oauth_proxy_server:
                    $ref: '#/components/schemas/OAuthProxyServerForm'
                project_slug_input:
                    type: string
                slug:
                    type: string
                    description: A short url-friendly label that uniquely identifies a resource.
                    pattern: ^[a-z0-9_-]{1,128}$
                    maxLength: 40
            required:
                - slug
                - oauth_proxy_server
        AddOAuthProxyServerRequestBody:
            type: object
            properties:
