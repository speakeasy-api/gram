                    type: string
                    description: Gram URN associated with this hook trace
                hook_source:
                    type: string
                    description: Hook source (from attributes.gram.hook.source)
                hook_status:
                    type: string
                    description: Hook execution status
                    enum:
                        - success
                        - failure
                        - pending
                        - blocked
                log_count:
                    type: integer
                    description: Total number of logs in this trace
