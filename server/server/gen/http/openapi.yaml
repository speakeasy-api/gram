  Project:
    title: Project
    type: object
    properties:
      created_at:
        type: string
        description: The creation date of the project.
        example: "1970-01-01T00:00:01Z"
        format: date-time
      id:
        type: string
        description: The ID of the project
        example: abc123
      logo_asset_id:
        type: string
        description: The ID of the logo asset for the project
        example: abc123
      name:
        type: string
        description: The name of the project
        example: abc123
      organization_id:
        type: string
        description: The ID of the organization that owns the project
        example: abc123
      slug:
        type: string
        description: The slug of the project
        example: aaa
        pattern: ^[a-z0-9_-]{1,128}$
        maxLength: 40
      updated_at:
        type: string
        description: The last update date of the project.
        example: "1970-01-01T00:00:01Z"
        format: date-time
    example:
      created_at: "1970-01-01T00:00:01Z"
      id: abc123
      logo_asset_id: abc123
      name: abc123
      organization_id: abc123
      slug: aaa
      updated_at: "1970-01-01T00:00:01Z"
    required:
      - id
      - name
      - slug
      - organization_id
      - created_at
      - updated_at
  ProjectEntry:
    title: ProjectEntry
    type: object
