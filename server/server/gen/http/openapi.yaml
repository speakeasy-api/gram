securityDefinitions:
  apikey_header_Authorization:
    type: apiKey
    description: |-
      key based auth.

      **Security Scopes**:
        * `consumer`: consumer based tool access
        * `producer`: producer based tool access
        * `chat`: chat based model usage access
        * `hooks`: hooks based access for Claude Code integrations
    name: Authorization
    in: header
  apikey_header_Gram-Key:
    type: apiKey
    description: |-
      key based auth.

      **Security Scopes**:
        * `consumer`: consumer based tool access
        * `producer`: producer based tool access
        * `chat`: chat based model usage access
        * `hooks`: hooks based access for Claude Code integrations
    name: Gram-Key
    in: header
  chat_sessions_token_header_Gram-Chat-Session:
    type: apiKey
    description: Gram Chat Sessions token based auth.
    name: Gram-Chat-Session
    in: header
  function_token_header_Authorization:
    type: apiKey
    description: Gram Functions token based auth.
    name: Authorization
    in: header
  project_slug_header_Gram-Project:
    type: apiKey
    description: project slug header auth.
    name: Gram-Project
    in: header
  session_header_Gram-Session:
    type: apiKey
    description: Session based auth. By cookie or header.
    name: Gram-Session
    in: header
