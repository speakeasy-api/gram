  AuthzChallenge:
    title: AuthzChallenge
    type: object
    properties:
      evaluated_grant_count:
        type: integer
        description: Total grants evaluated.
        example: 1
        format: int64
      id:
        type: string
        description: Unique challenge identifier.
        example: abc123
      matched_grant_count:
        type: integer
        description: Number of grants that matched.
        example: 1
        format: int64
      operation:
        type: string
        example: require_any
        enum:
          - require
          - require_any
          - filter
      organization_id:
        type: string
        description: Organization the principal was acting in.
        example: abc123
      outcome:
        type: string
        example: deny
        enum:
          - allow
          - deny
          - error
      photo_url:
        type: string
        description: User avatar URL when available.
        example: abc123
      principal_type:
        type: string
        description: Kind of principal.
        example: api_key
        enum:
          - user
          - api_key
          - assistant
      principal_urn:
        type: string
        description: Principal URN e.g. user:<uuid> or api_key:<id>.
        example: abc123
      project_id:
        type: string
        description: Project scope (empty for org-level checks).
        example: abc123
      reason:
        type: string
        example: no_grants
        enum:
          - grant_matched
          - no_grants
          - scope_unsatisfied
          - invalid_check
          - rbac_skipped_apikey
          - dev_override
      resolution_role_slug:
        type: string
        description: Role slug assigned (when resolution_type=role_assigned).
        example: abc123
      resolution_type:
        type: string
        description: How the challenge was resolved.
        example: dismissed
        enum:
          - role_assigned
          - dismissed
      resolved_at:
        type: string
        description: When the challenge was resolved by an admin.
        example: "1970-01-01T00:00:01Z"
        format: date-time
      resolved_by:
        type: string
        description: URN of the admin who resolved.
        example: abc123
      resource_id:
        type: string
        description: Resource ID of the check.
        example: abc123
      resource_kind:
        type: string
        description: Resource kind of the check.
        example: abc123
      role_slugs:
        type: array
        items:
          type: string
          example: abc123
        description: Roles the principal had loaded.
        example:
          - abc123
      scope:
        type: string
        description: Scope that was checked.
        example: abc123
      timestamp:
        type: string
        description: When the authz decision was made.
        example: "1970-01-01T00:00:01Z"
        format: date-time
      user_email:
        type: string
        description: Email when available.
        example: abc123
    example:
      evaluated_grant_count: 1
      id: abc123
      matched_grant_count: 1
      operation: require_any
      organization_id: abc123
      outcome: deny
      photo_url: abc123
      principal_type: api_key
      principal_urn: abc123
      project_id: abc123
      reason: no_grants
      resolution_role_slug: abc123
      resolution_type: dismissed
      resolved_at: "1970-01-01T00:00:01Z"
      resolved_by: abc123
      resource_id: abc123
      resource_kind: abc123
      role_slugs:
        - abc123
      scope: abc123
      timestamp: "1970-01-01T00:00:01Z"
      user_email: abc123
    required:
      - id
      - timestamp
      - organization_id
      - principal_urn
      - principal_type
      - operation
      - outcome
      - reason
      - scope
      - role_slugs
      - evaluated_grant_count
      - matched_grant_count
