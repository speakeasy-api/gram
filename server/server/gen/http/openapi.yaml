    type: object
    properties:
      filters:
        type: array
        items:
          $ref: "#/definitions/LogFilter"
        description: Filter conditions (same as listHooksTraces)
        example:
          - operator: not_eq
            path: "@user.region"
            values:
              - abc123
              - abc123
              - abc123
      from:
        type: string
        description: Start time in ISO 8601 format
        example: "2025-12-19T10:00:00Z"
        format: date-time
      to:
        type: string
        description: End time in ISO 8601 format
        example: "2025-12-19T11:00:00Z"
        format: date-time
      types_to_include:
        type: array
        items:
          type: string
          example: local
          enum:
            - mcp
            - local
            - skill
        description: Hook types to include (mcp, local, skill). If empty, includes all types.
        example:
          - mcp
          - skill
    example:
      filters:
        - operator: not_eq
          path: "@user.region"
          values:
            - abc123
            - abc123
            - abc123
      from: "2025-12-19T10:00:00Z"
      to: "2025-12-19T11:00:00Z"
      types_to_include:
        - mcp
        - skill
    required:
      - from
      - to
