  HooksClaudeRequestBody:
    title: HooksClaudeRequestBody
    type: object
    properties:
      additional_data:
        type: object
        description: Additional hook-specific data
        example:
          abc123: abc123
        additionalProperties: true
      cwd:
        type: string
        description: The working directory when the event fired
        example: abc123
      error:
        description: The error from the tool (PostToolUseFailure only)
        example: abc123
      hook_event_name:
        type: string
        description: The type of hook event
        example: PreToolUse
        enum:
          - SessionStart
          - PreToolUse
          - PostToolUse
          - PostToolUseFailure
          - UserPromptSubmit
          - Stop
          - SessionEnd
          - Notification
      is_interrupt:
        type: boolean
        description: Whether the failure was caused by user interruption (PostToolUseFailure only)
        example: false
      last_assistant_message:
        type: string
        description: Claude's final response text (Stop only)
        example: abc123
      message:
        type: string
        description: Notification message text (Notification only)
        example: abc123
      model:
        type: string
        description: The model identifier (SessionStart, Stop)
        example: abc123
      notification_type:
        type: string
        description: "Type of notification: permission_prompt, idle_prompt, auth_success, elicitation_dialog (Notification only)"
        example: abc123
      prompt:
        type: string
        description: The user's prompt text (UserPromptSubmit only)
        example: abc123
      reason:
        type: string
        description: Why the session ended (SessionEnd only)
        example: abc123
      session_id:
        type: string
        description: The Claude Code session ID
        example: abc123
      source:
        type: string
        description: "How the session started: startup, resume, clear, compact (SessionStart only)"
        example: abc123
      stop_hook_active:
        type: boolean
        description: Whether a stop hook continuation is active (Stop only)
        example: false
      title:
        type: string
        description: Notification title (Notification only)
        example: abc123
      tool_input:
        description: The input to the tool
        example: abc123
      tool_name:
        type: string
        description: The name of the tool (for tool-related events)
        example: abc123
      tool_response:
        description: The response from the tool (PostToolUse only)
        example: abc123
      tool_use_id:
        type: string
        description: The unique ID for this tool use
        example: abc123
      transcript_path:
        type: string
        description: Path to the conversation transcript file
        example: abc123
    example:
      additional_data:
        abc123: abc123
      cwd: abc123
      error: abc123
      hook_event_name: PreToolUse
      is_interrupt: false
      last_assistant_message: abc123
      message: abc123
      model: abc123
      notification_type: abc123
      prompt: abc123
      reason: abc123
      session_id: abc123
      source: abc123
      stop_hook_active: false
      title: abc123
      tool_input: abc123
      tool_name: abc123
      tool_response: abc123
      tool_use_id: abc123
      transcript_path: abc123
    required:
      - hook_event_name
