  ToolsetEntry:
    title: ToolsetEntry
    type: object
    properties:
      created_at:
        type: string
        description: When the toolset was created.
        example: "1970-01-01T00:00:01Z"
        format: date-time
      custom_domain_id:
        type: string
        description: The ID of the custom domain to use for the toolset
        example: abc123
      default_environment_slug:
        type: string
        description: The slug of the environment to use as the default for the toolset
        example: aaa
        pattern: ^[a-z0-9_-]{1,128}$
        maxLength: 40
      description:
        type: string
        description: Description of the toolset
        example: abc123
      external_mcp_header_definitions:
        type: array
        items:
          $ref: "#/definitions/ExternalMCPHeaderDefinition"
        description: The external MCP header definitions that are relevant to the toolset
        example:
          - description: abc123
            header_name: abc123
            name: abc123
            placeholder: abc123
            required: false
            secret: false
      function_environment_variables:
        type: array
        items:
          $ref: "#/definitions/FunctionEnvironmentVariable"
        description: The function environment variables that are relevant to the toolset
        example:
          - auth_input_type: abc123
            description: abc123
            name: abc123
      id:
        type: string
        description: The ID of the toolset
        example: abc123
      mcp_enabled:
        type: boolean
        description: Whether the toolset is enabled for MCP
        example: false
      mcp_is_public:
        type: boolean
        description: Whether the toolset is public in MCP
        example: false
      mcp_slug:
        type: string
        description: The slug of the MCP to use for the toolset
        example: aaa
        pattern: ^[a-z0-9_-]{1,128}$
        maxLength: 40
      name:
        type: string
        description: The name of the toolset
        example: abc123
      organization_id:
        type: string
        description: The organization ID this toolset belongs to
        example: abc123
      origin:
        $ref: "#/definitions/ToolsetOrigin"
      project_id:
        type: string
        description: The project ID this toolset belongs to
        example: abc123
      prompt_templates:
        type: array
        items:
          $ref: "#/definitions/PromptTemplateEntry"
        description: "The prompt templates in this toolset -- Note: these are actual prompts, as in MCP prompts"
        example:
          - id: abc123
            kind: abc123
            name: aaa
      resource_urns:
        type: array
        items:
          type: string
          example: abc123
        description: The resource URNs in this toolset
        example:
          - abc123
      resources:
        type: array
        items:
          $ref: "#/definitions/ResourceEntry"
        description: The resources in this toolset
        example:
          - id: abc123
            name: abc123
            resource_urn: abc123
            type: function
            uri: abc123
      security_variables:
        type: array
        items:
          $ref: "#/definitions/SecurityVariable"
        description: The security variables that are relevant to the toolset
        example:
          - bearer_format: abc123
            display_name: abc123
            env_variables:
              - abc123
            id: abc123
            in_placement: abc123
            name: abc123
            oauth_flows:
              - 97
              - 98
              - 99
              - 49
              - 50
              - 51
            oauth_types:
              - abc123
            scheme: abc123
            type: abc123
      server_variables:
        type: array
        items:
          $ref: "#/definitions/ServerVariable"
        description: The server variables that are relevant to the toolset
        example:
          - description: abc123
            env_variables:
              - abc123
      slug:
        type: string
        description: The slug of the toolset
        example: aaa
        pattern: ^[a-z0-9_-]{1,128}$
        maxLength: 40
      tool_selection_mode:
        type: string
        description: The mode to use for tool selection
        example: abc123
      tool_urns:
        type: array
        items:
          type: string
          example: abc123
        description: The tool URNs in this toolset
        example:
          - abc123
      tools:
        type: array
        items:
          $ref: "#/definitions/ToolEntry"
        description: The tools in this toolset
        example:
          - annotations:
              destructive_hint: false
              idempotent_hint: false
              open_world_hint: false
              read_only_hint: false
              title: abc123
            http_method: abc123
            id: abc123
            name: abc123
            tool_urn: abc123
            type: prompt
      updated_at:
        type: string
        description: When the toolset was last updated.
        example: "1970-01-01T00:00:01Z"
        format: date-time
    example:
      created_at: "1970-01-01T00:00:01Z"
      custom_domain_id: abc123
      default_environment_slug: aaa
      description: abc123
