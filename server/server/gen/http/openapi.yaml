  ToolsetsUpdateToolsetRequestBody:
    title: ToolsetsUpdateToolsetRequestBody
    type: object
    properties:
      custom_domain_id:
        type: string
        description: The ID of the custom domain to use for the toolset
        example: abc123
      default_environment_slug:
        type: string
        description: The slug of the environment to use as the default for the toolset
        example: aaa
        pattern: ^[a-z0-9_-]{1,128}$
        maxLength: 40
      description:
        type: string
        description: The new description of the toolset
        example: abc123
      mcp_enabled:
        type: boolean
        description: Whether the toolset is enabled for MCP
        example: false
      mcp_is_public:
        type: boolean
        description: Whether the toolset is public in MCP
        example: false
      mcp_slug:
        type: string
        description: The slug of the MCP to use for the toolset
        example: aaa
        pattern: ^[a-z0-9_-]{1,128}$
        maxLength: 40
      name:
        type: string
        description: The new name of the toolset
        example: abc123
      prompt_template_names:
        type: array
        items:
          type: string
          example: abc123
        description: "List of prompt template names to include (note: for actual prompts, not tools)"
        example:
          - abc123
      resource_urns:
        type: array
        items:
          type: string
          example: abc123
        description: List of resource URNs to include in the toolset
        example:
          - abc123
      tool_selection_mode:
        type: string
        description: The mode to use for tool selection
        example: abc123
      tool_urns:
        type: array
        items:
          type: string
          example: abc123
        description: List of tool URNs to include in the toolset
        example:
          - abc123
    example:
      custom_domain_id: abc123
      default_environment_slug: aaa
      description: abc123
      mcp_enabled: false
      mcp_is_public: false
      mcp_slug: aaa
      name: abc123
      prompt_template_names:
        - abc123
      resource_urns:
        - abc123
      tool_selection_mode: abc123
      tool_urns:
        - abc123
