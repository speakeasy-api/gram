  LogFilter:
    title: LogFilter
    type: object
    properties:
      operator:
        type: string
        description: Comparison operator
        default: eq
        example: not_eq
        enum:
          - eq
          - not_eq
          - contains
          - exists
          - not_exists
          - in
      path:
        type: string
        description: Attribute path. Use @ prefix for custom attributes (e.g. '@user.region'), or bare path for system attributes (e.g. 'http.route').
        example: "@user.region"
        pattern: ^@?[a-zA-Z_][a-zA-Z0-9_]*(\.[a-zA-Z_][a-zA-Z0-9_]*)*$
        minLength: 1
        maxLength: 256
      values:
        type: array
        items:
          type: string
          example: abc123
        description: Values to compare against. Pass one value for single-value operators (eq, not_eq, contains) and multiple for 'in'. Ignored for 'exists' and 'not_exists'.
        example:
          - abc123
          - abc123
          - abc123
        maxItems: 256
    description: A single filter condition for a log search query.
    example:
      operator: not_eq
      path: "@user.region"
      values:
        - abc123
        - abc123
        - abc123
    required:
      - path
