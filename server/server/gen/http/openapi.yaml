      total_messages:
        type: integer
        description: Total number of messages in the project.
        example: 1
        format: int64
      updated_at:
        type: string
        description: When the policy was last updated.
        example: "1970-01-01T00:00:01Z"
        format: date-time
      user_message:
        type: string
        description: Optional message shown to the end user when this policy blocks an action or surfaces a flagged finding. When unset, a default message is rendered.
        example: abc123
      version:
        type: integer
        description: Policy version, incremented on each update.
        example: 1
        format: int64
