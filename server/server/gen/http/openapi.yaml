  UserSummary:
    title: UserSummary
    type: object
    properties:
      avg_tokens_per_request:
        type: number
        description: Average tokens per chat request
        example: 1
        format: double
      cache_creation_input_tokens:
        type: integer
        description: Sum of cache creation input tokens
        example: 1
        format: int64
      cache_read_input_tokens:
        type: integer
        description: Sum of cache read input tokens
        example: 1
        format: int64
      first_seen_unix_nano:
        type: string
        description: Earliest activity timestamp in Unix nanoseconds
        example: abc123
      last_seen_unix_nano:
        type: string
        description: Latest activity timestamp in Unix nanoseconds
        example: abc123
      tool_call_failure:
        type: integer
        description: Failed tool calls (4xx/5xx status)
        example: 1
        format: int64
      tool_call_success:
        type: integer
        description: Successful tool calls (2xx status)
        example: 1
        format: int64
      tools:
        type: array
        items:
          $ref: "#/definitions/ToolUsage"
        description: Per-tool usage breakdown
        example:
          - count: 1
            failure_count: 1
            success_count: 1
            urn: abc123
      total_chat_requests:
        type: integer
        description: Total number of chat completion requests
        example: 1
        format: int64
      total_chats:
        type: integer
        description: Number of unique chat sessions
        example: 1
        format: int64
      total_cost:
        type: number
        description: Total cost of all requests
        example: 1
        format: double
      total_input_tokens:
        type: integer
        description: Sum of input tokens used
        example: 1
        format: int64
      total_output_tokens:
        type: integer
        description: Sum of output tokens used
        example: 1
        format: int64
      total_tokens:
        type: integer
        description: Sum of all tokens used
        example: 1
        format: int64
      total_tool_calls:
        type: integer
        description: Total number of tool calls
        example: 1
        format: int64
      user_id:
        type: string
        description: User identifier (user_id or external_user_id depending on group_by)
        example: abc123
    description: Aggregated usage summary for a single user
    example:
      avg_tokens_per_request: 1
      cache_creation_input_tokens: 1
      cache_read_input_tokens: 1
      first_seen_unix_nano: abc123
      last_seen_unix_nano: abc123
      tool_call_failure: 1
      tool_call_success: 1
      tools:
        - count: 1
          failure_count: 1
          success_count: 1
          urn: abc123
      total_chat_requests: 1
      total_chats: 1
      total_cost: 1
      total_input_tokens: 1
      total_output_tokens: 1
      total_tokens: 1
      total_tool_calls: 1
      user_id: abc123
    required:
      - user_id
      - first_seen_unix_nano
      - last_seen_unix_nano
      - total_chats
      - total_chat_requests
      - total_input_tokens
      - total_output_tokens
      - total_tokens
      - cache_read_input_tokens
      - cache_creation_input_tokens
      - total_cost
      - avg_tokens_per_request
      - total_tool_calls
      - tool_call_success
      - tool_call_failure
      - tools
