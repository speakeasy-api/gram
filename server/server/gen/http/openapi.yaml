  /rpc/access.listChallenges:
    get:
      description: |-
        List authz challenge events from ClickHouse, enriched with resolution state from PostgreSQL.

        **Required security scopes for apikey**:
          * `consumer`
      operationId: access#listChallenges
      parameters:
        - description: Filter by outcome.
          enum:
            - allow
            - deny
          in: query
          name: outcome
          required: false
          type: string
        - description: Filter by principal URN.
          in: query
          name: principal_urn
          required: false
          type: string
        - description: Filter by scope.
          in: query
          name: scope
          required: false
          type: string
        - description: Filter to a specific project.
          in: query
          name: project_id
          required: false
          type: string
        - description: Filter by resolution state. True = only resolved, false = only unresolved.
          in: query
          name: resolved
          required: false
          type: boolean
        - default: 50
          description: Maximum number of results to return.
          in: query
          maximum: 200
          minimum: 1
          name: limit
          required: false
          type: integer
        - default: 0
          description: Number of results to skip.
          in: query
          minimum: 0
          name: offset
          required: false
          type: integer
        - description: API Key header
          in: header
          name: Gram-Key
          required: false
          type: string
        - description: Session header
          in: header
          name: Gram-Session
          required: false
          type: string
      responses:
        "200":
          description: OK response.
          schema:
            $ref: "#/definitions/ListChallengesResult"
            required:
              - challenges
              - total
        "400":
          description: Bad Request response.
          schema:
            $ref: "#/definitions/AccessListChallengesBadRequestResponseBody"
        "401":
          description: Unauthorized response.
          schema:
            $ref: "#/definitions/AccessListChallengesUnauthorizedResponseBody"
        "403":
          description: Forbidden response.
          schema:
            $ref: "#/definitions/AccessListChallengesForbiddenResponseBody"
        "404":
          description: Not Found response.
          schema:
            $ref: "#/definitions/AccessListChallengesNotFoundResponseBody"
        "409":
