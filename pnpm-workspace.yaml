packages:
  - client/*
  - sdks/*
  - ts-framework/*
  - ts-framework/create-function/*
  - "!ts-framework/create-function/gram-template-*"
  - server
  - cli
  - tunnel
  - functions
  - docs
  - evaluation
  - elements
  - elements/examples/*
  - dev-idp-dashboard

catalog:
  "@ai-sdk/react": ^4.0.12
  "@modelcontextprotocol/sdk": ^1.29.0
  "@tailwindcss/vite": ^4.3.1
  "@tanstack/react-query": 5.101.1
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@assistant-ui/react": ^0.11.0
  "@vitejs/plugin-react": ^6.0.3
  ai: ^7.0.11
  "lucide-react": ^1.21.0
  typescript: 5.9.3
  vite: ^8.1.2

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - "@oxfmt/*"
  - "oxfmt"
  - "react-router"
  - "@speakeasy-api/moonshine"
  - "@chromatic-com/storybook"

overrides:
  glob@>=10.0 <10.5.0: 10.5.0
  # Without this, @polar-sh/ui resolves Recharts v3 while Elements/Tremor stay on v2.
  recharts: 2.15.4
  # Radix sub-packages pin exact react-dismissable-layer versions, so mixed Radix
  # releases load multiple copies with separate layer-stack contexts — nested dismiss
  # layers then can't see each other (e.g. the filter sheet closing when dismissing a
  # dropdown inside it, DNO-393/AIS-168). Force one copy so all primitives share a stack.
  "@radix-ui/react-dismissable-layer": 1.1.13

peerDependencyRules:
  allowedVersions:
    # 0.10.0 is the latest release and predates vite 8; the plugin only reads
    # package.json to compute build externals, so vite 8 is fine.
    "vite-plugin-externalize-deps>vite": "^8.0.0"

allowBuilds:
  bun: true
  esbuild: true
  sharp: true
  core-js: false
  cpu-features: false
  msw: false
  ssh2: false
  "@openrouter/sdk": false

patchedDependencies:
  svix@1.92.2: patches/svix@1.92.2.patch
