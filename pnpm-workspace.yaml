packages:
  - client/*
  - sdks/*
  - ts-framework/*
  - ts-framework/create-function/*
  - "!ts-framework/create-function/gram-template-*"
  - server
  - cli
  - functions
  - docs
  - evaluation
  - elements
  - elements/examples/*
  - dev-idp-dashboard

catalog:
  "@ai-sdk/react": ^3.0.211
  "@modelcontextprotocol/sdk": ^1.29.0
  "@tanstack/react-query": 5.90.10
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@assistant-ui/react": ^0.11.0
  ai: ^6.0.209
  "lucide-react": ^1.8.0
  typescript: 5.9.3

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - "@oxfmt/*"
  - "oxfmt"
  - "react-router"
  - "@speakeasy-api/moonshine"
  - "@chromatic-com/storybook"

overrides:
  glob@>=10.0 <10.5.0: 10.5.0
  # Without this, @polar-sh/ui resolves Recharts v3 while Elements/Tremor stay on v2.
  recharts: 2.15.4

allowBuilds:
  bun: true
  esbuild: true
  sharp: true
  core-js: false
  cpu-features: false
  msw: false
  ssh2: false
