packages:
  - client/*
  - sdks/*
  - ts-framework/*
  - ts-framework/create-function/*
  - "!ts-framework/create-function/gram-template-*"
  - server
  - cli
  - tunnel
  - hooks
  - functions
  - docs
  - evaluation
  - dev-idp-dashboard

catalog:
  "@ai-sdk/react": ^4.0.30
  "@modelcontextprotocol/sdk": ^1.29.0
  "@tailwindcss/vite": ^4.3.2
  "@tanstack/react-query": 5.101.1
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@assistant-ui/react": ^0.14.27
  "@vitejs/plugin-react": ^6.0.3
  ai: ^7.0.28
  "lucide-react": ^1.23.0
  typescript: 7.0.2
  vite: ^8.1.5

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - "typescript"
  - "@typescript/*"
  - "@oxfmt/*"
  - "oxfmt"
  - "react-router"
  - "@speakeasy-api/moonshine"
  - "@chromatic-com/storybook"

overrides:
  glob@>=10.0 <10.5.0: 10.5.0
  # Radix sub-packages pin exact react-dismissable-layer versions, so mixed Radix
  # releases load multiple copies with separate layer-stack contexts — nested dismiss
  # layers then can't see each other (e.g. the filter sheet closing when dismissing a
  # dropdown inside it, DNO-393/AIS-168). Force one copy so all primitives share a stack.
  "@radix-ui/react-dismissable-layer": 1.1.13
  # assistant-cloud is an optional peer of @assistant-ui/core pinned to an exact
  # assistant-stream version per release (0.1.34 -> assistant-stream 0.3.25,
  # 0.1.35 -> assistant-stream 0.3.26). @assistant-ui/react and
  # @assistant-ui/react-ai-sdk resolve this peer independently, so without an
  # override they land on different assistant-cloud releases and pull two
  # copies of assistant-stream (AGE-2977). Force one copy.
  assistant-cloud: 0.1.35

peerDependencyRules:
  allowedVersions:
    # 0.10.0 is the latest release and predates vite 8; the plugin only reads
    # package.json to compute build externals, so vite 8 is fine.
    "vite-plugin-externalize-deps>vite": "^8.0.0"

allowBuilds:
  bun: true
  esbuild: true
  sharp: true
  core-js: false
  cpu-features: false
  msw: false
  ssh2: false
  "@openrouter/sdk": false

patchedDependencies:
  svix@1.92.2: patches/svix@1.92.2.patch
