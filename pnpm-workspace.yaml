packages:
  - client/*
  - sdks/*
  - ts-framework/*
  - ts-framework/create-function/*
  - "!ts-framework/create-function/gram-template-*"
  - server
  - cli
  - functions
  - docs
  - evaluation
  - elements
  - elements/examples/*
  - dev-idp-dashboard

catalog:
  "@ai-sdk/openai": ^2.0.0
  "@ai-sdk/react": ^2.0.118
  "@ai-sdk/ui-utils": ^1.2.0
  "@modelcontextprotocol/sdk": ^1.27.0
  "@tanstack/react-query": 5.90.10
  "@types/react": ^19.2.7
  "@types/react-dom": ^19.2.3
  "@assistant-ui/react": ^0.11.0
  ai: 5.0.66
  "lucide-react": ^1.8.0
  typescript: 5.9.3

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - "@oxfmt/*"
  - "oxfmt"
  - "react-router"
  - "@speakeasy-api/moonshine"
  - "@chromatic-com/storybook"

onlyBuiltDependencies:
  - bun
  - esbuild
  - sharp

overrides:
  glob@>=10.0 <10.5.0: 10.5.0
