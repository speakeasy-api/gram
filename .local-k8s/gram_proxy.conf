# Shared proxy settings for gram-server API locations (incl. SSE streaming).
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection "";
proxy_buffering off;        # SSE / streaming (mcp, chat)
proxy_read_timeout 300s;
proxy_send_timeout 300s;
# gram_session/gram_admin cookies are flagged Secure (baked into the Goa design),
# which the browser drops over plain http. We serve gram.local over http locally,
# so strip Secure as the cookie passes back through the proxy. Keeps HttpOnly.
proxy_cookie_flags ~ nosecure;
