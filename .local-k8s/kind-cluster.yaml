# kind cluster config for local Gram with a working ingress.
# Maps host 80/443 -> control-plane node so http://gram.local reaches nginx
# without port-forwarding, and labels the node ingress-ready for the controller.
#   kind create cluster --name local-mess --config .local-k8s/kind-cluster.yaml
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - { containerPort: 80, hostPort: 80, protocol: TCP }
      - { containerPort: 443, hostPort: 443, protocol: TCP }
