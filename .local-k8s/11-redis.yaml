apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: gram-local
  labels: { app: redis }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:6.2-alpine
          args: ["redis-server", "--port", "6379", "--requirepass", "gramredis"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec: { command: ["redis-cli", "-a", "gramredis", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: gram-local
spec:
  selector: { app: redis }
  ports:
    - { port: 6379, targetPort: 6379 }
