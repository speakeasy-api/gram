# Single-origin dashboard for local k8s: serves the SPA AND reverse-proxies
# Gram API paths to the gram-server Service. This mirrors the vite dev proxy
# (/rpc /chat /mcp /oauth /oauth-external /.well-known /v1) so the dashboard and
# API share one origin (http://gram.local) — required for the OAuth callback
# (/rpc/auth.callback) and same-origin session cookies.
server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    resolver 10.96.0.10 valid=30s; # kube-dns
    set $gram_api http://gram-server.gram-local.svc.cluster.local:8080;

    # --- API + auth: proxy to gram-server ---
    location /rpc/            { proxy_pass $gram_api; include /etc/nginx/gram_proxy.conf; }
    location /oauth/          { proxy_pass $gram_api; include /etc/nginx/gram_proxy.conf; }
    location /oauth-external/ { proxy_pass $gram_api; include /etc/nginx/gram_proxy.conf; }
    location /mcp/            { proxy_pass $gram_api; include /etc/nginx/gram_proxy.conf; }
    location /chat/           { proxy_pass $gram_api; include /etc/nginx/gram_proxy.conf; }
    location /v1/             { proxy_pass $gram_api; include /etc/nginx/gram_proxy.conf; }
    location /.well-known/    { proxy_pass $gram_api; include /etc/nginx/gram_proxy.conf; }
    location = /healthz       { proxy_pass $gram_api; include /etc/nginx/gram_proxy.conf; }
    location = /openapi.yaml  { proxy_pass $gram_api; include /etc/nginx/gram_proxy.conf; }

    # --- static assets (SPA) ---
    location ~* ^/external/.+\.js$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
    location ~* \.(js|css)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # --- SPA routing fallback ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
