apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: gram-local
  labels: { app: postgres }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_USER, value: gram }
            - { name: POSTGRES_PASSWORD, value: gram }
            - { name: POSTGRES_DB, value: gram }
            # PGDATA in a subdir so the emptyDir mount root stays clean
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "gram"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        # emptyDir = data wiped on pod restart. Swap for a PVC if you want persistence.
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: gram-local
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
